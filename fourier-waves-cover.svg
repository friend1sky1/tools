<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F5EE"/>
      <stop offset="100%" stop-color="#E8EDE6"/>
    </linearGradient>
    <linearGradient id="sumGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D4A32"/>
      <stop offset="50%" stop-color="#3D5A42"/>
      <stop offset="100%" stop-color="#2D4A32"/>
    </linearGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(45,74,50,0.06)"/>
      <stop offset="100%" stop-color="rgba(45,74,50,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#5B8C5A" stroke-width="0.5">
    <line x1="0" y1="80" x2="640" y2="80"/><line x1="0" y1="160" x2="640" y2="160"/>
    <line x1="0" y1="240" x2="640" y2="240"/><line x1="0" y1="320" x2="640" y2="320"/>
    <line x1="128" y1="0" x2="128" y2="400"/><line x1="256" y1="0" x2="256" y2="400"/>
    <line x1="384" y1="0" x2="384" y2="400"/><line x1="512" y1="0" x2="512" y2="400"/>
  </g>

  <!-- Wave drawing area -->
  <g transform="translate(60, 200)">
    <!-- Horizontal baseline -->
    <line x1="0" y1="0" x2="520" y2="0" stroke="#6B7D6C" stroke-width="1" opacity="0.3"/>
    
    <!-- Amplitude reference lines -->
    <line x1="0" y1="-80" x2="520" y2="-80" stroke="#6B7D6C" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.15"/>
    <line x1="0" y1="80" x2="520" y2="80" stroke="#6B7D6C" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.15"/>

    <!-- 1st harmonic: sin(x), 1 full cycle, amplitude 75 -->
    <path d="M 0,0 C 30,-65 75,-80 130,-80 C 185,-80 230,-65 260,0 C 290,65 335,80 390,80 C 445,80 490,65 520,0"
          fill="none" stroke="#5B8C5A" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>

    <!-- 3rd harmonic: sin(3x)/3, amplitude 25 -->
    <path d="M 0,0 
      C 8,-20 18,-25 32,-25 C 46,-25 56,-20 64,0 
      C 72,20 82,25 96,25 C 110,25 120,20 128,0 
      C 136,-20 146,-25 160,-25 C 174,-25 184,-20 192,0 
      C 200,20 210,25 224,25 C 238,25 248,20 256,0 
      C 264,-20 274,-25 288,-25 C 302,-25 312,-20 320,0 
      C 328,20 338,25 352,25 C 366,25 376,20 384,0 
      C 392,-20 402,-25 416,-25 C 430,-25 440,-20 448,0 
      C 456,20 466,25 480,25 C 494,25 504,20 512,0"
          fill="none" stroke="#C5A96A" stroke-width="1.3" opacity="0.4" stroke-linecap="round"/>

    <!-- 5th harmonic: sin(5x)/5, amplitude 15 -->
    <path d="M 0,0 
      C 5,-12 10,-15 17,-15 C 24,-15 29,-12 34,0 
      C 39,12 44,15 51,15 C 58,15 63,12 68,0 
      C 73,-12 78,-15 85,-15 C 92,-15 97,-12 102,0 
      C 107,12 112,15 119,15 C 126,15 131,12 136,0 
      C 141,-12 146,-15 153,-15 C 160,-15 165,-12 170,0 
      C 175,12 180,15 187,15 C 194,15 199,12 204,0 
      C 209,-12 214,-15 221,-15 C 228,-15 233,-12 238,0 
      C 243,12 248,15 255,15 C 262,15 267,12 272,0 
      C 277,-12 282,-15 289,-15 C 296,-15 301,-12 306,0 
      C 311,12 316,15 323,15 C 330,15 335,12 340,0 
      C 345,-12 350,-15 357,-15 C 364,-15 369,-12 374,0 
      C 379,12 384,15 391,15 C 398,15 403,12 408,0 
      C 413,-12 418,-15 425,-15 C 432,-15 437,-12 442,0 
      C 447,12 452,15 459,15 C 466,15 471,12 476,0 
      C 481,-12 486,-15 493,-15 C 500,-15 505,-12 510,0"
          fill="none" stroke="#7BA8B4" stroke-width="1" opacity="0.35" stroke-linecap="round"/>

    <!-- SUM wave: Fourier square wave approximation (thick, prominent) -->
    <!-- Approximation of sin(x) + sin(3x)/3 + sin(5x)/5 + sin(7x)/7 -->
    <path d="M 0,0 
      C 10,-40 25,-65 50,-75 
      C 70,-80 85,-78 100,-72 
      C 115,-62 125,-45 130,-20 
      C 132,-5 133,5 135,15 
      C 140,45 155,65 175,75 
      C 195,80 210,78 225,72 
      C 240,62 250,45 255,20 
      C 257,5 258,-5 260,-15 
      C 265,-45 280,-65 300,-75 
      C 320,-80 335,-78 350,-72 
      C 365,-62 375,-45 380,-20 
      C 382,-5 383,5 385,15 
      C 390,45 405,65 425,75 
      C 445,80 460,78 475,72 
      C 490,62 500,45 505,20 
      C 507,5 508,-5 510,-15"
          fill="none" stroke="url(#sumGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Gibbs overshoot indicators at transitions -->
    <circle cx="130" cy="-78" r="2" fill="#2D4A32" opacity="0.4"/>
    <circle cx="260" cy="-78" r="2" fill="#2D4A32" opacity="0.4"/>
    <circle cx="390" cy="-78" r="2" fill="#2D4A32" opacity="0.4"/>
  </g>

  <!-- Wave labels (right side) -->
  <g transform="translate(590, 100)" font-family="serif" font-size="12" font-style="italic">
    <line x1="-10" y1="0" x2="0" y2="0" stroke="#5B8C5A" stroke-width="2" opacity="0.5"/>
    <text x="8" y="4" fill="#5B8C5A" opacity="0.7">sin x</text>
    <line x1="-10" y1="25" x2="0" y2="25" stroke="#C5A96A" stroke-width="1.5" opacity="0.4"/>
    <text x="8" y="29" fill="#C5A96A" opacity="0.6">sin 3x/3</text>
    <line x1="-10" y1="50" x2="0" y2="50" stroke="#7BA8B4" stroke-width="1" opacity="0.35"/>
    <text x="8" y="54" fill="#7BA8B4" opacity="0.5">sin 5x/5</text>
    <line x1="-10" y1="75" x2="0" y2="75" stroke="#2D4A32" stroke-width="3"/>
    <text x="8" y="79" fill="#2D4A32" font-weight="bold">合成波</text>
  </g>

  <!-- π markers on baseline -->
  <g transform="translate(60, 200)" font-family="serif" font-size="11" fill="#6B7D6C" opacity="0.4">
    <text x="130" y="18" text-anchor="middle">π</text>
    <text x="260" y="18" text-anchor="middle">2π</text>
    <text x="390" y="18" text-anchor="middle">3π</text>
    <text x="520" y="18" text-anchor="middle">4π</text>
    <text x="-5" y="-78" text-anchor="end">1</text>
    <text x="-5" y="82" text-anchor="end">-1</text>
  </g>

  <!-- Shadow -->
  <ellipse cx="320" cy="360" rx="200" ry="10" fill="url(#shadow)"/>

  <!-- Title -->
  <text x="320" y="36" fill="#5B8C5A" font-family="'Noto Serif SC', serif" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="4">正弦波叠加</text>
  <line x1="260" y1="50" x2="380" y2="50" stroke="#C5A96A" stroke-width="1" opacity="0.4"/>

  <!-- Formula -->
  <text x="100" y="370" fill="#6B7D6C" font-family="serif" font-size="12" font-style="italic" opacity="0.5">f(x) = Σ sin((2n−1)x)/(2n−1)</text>
</svg>
