<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F5EE"/>
      <stop offset="100%" stop-color="#E2EBE0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#D6E5D2" stroke-width="0.5" opacity="0.5">
    <line x1="160" y1="40" x2="160" y2="360"/>
    <line x1="240" y1="40" x2="240" y2="360"/>
    <line x1="320" y1="40" x2="320" y2="360"/>
    <line x1="400" y1="40" x2="400" y2="360"/>
    <line x1="480" y1="40" x2="480" y2="360"/>
    <line x1="560" y1="40" x2="560" y2="360"/>
    <line x1="80" y1="80" x2="600" y2="80"/>
    <line x1="80" y1="120" x2="600" y2="120"/>
    <line x1="80" y1="160" x2="600" y2="160"/>
    <line x1="80" y1="200" x2="600" y2="200"/>
    <line x1="80" y1="240" x2="600" y2="240"/>
    <line x1="80" y1="320" x2="600" y2="320"/>
  </g>

  <!-- Coordinate axes -->
  <g stroke="#6B7D6C" stroke-width="1.5">
    <line x1="120" y1="40" x2="120" y2="360"/>
    <line x1="60" y1="280" x2="600" y2="280"/>
  </g>

  <!-- Axis arrows -->
  <polygon points="120,40 116,50 124,50" fill="#6B7D6C"/>
  <polygon points="600,280 590,276 590,284" fill="#6B7D6C"/>

  <!-- Axis labels -->
  <text x="130" y="55" font-family="Georgia, serif" font-size="14" fill="#6B7D6C" font-style="italic">y</text>
  <text x="592" y="270" font-family="Georgia, serif" font-size="14" fill="#6B7D6C" font-style="italic">x</text>
  <text x="108" y="298" font-family="Georgia, serif" font-size="12" fill="#6B7D6C">O</text>

  <!-- Main parabola: a>0, y_svg = 80 + 0.004*(x-320)^2 -->
  <!-- Key points: (80,308) (120,240) (160,182) (200,138) (240,106) (280,86) (320,80) (360,86) (400,106) (440,138) (480,182) (520,240) (560,308) -->
  <path d="M 80,308 Q 120,240 160,182 Q 200,124 240,106 Q 280,88 320,80 Q 360,88 400,106 Q 440,124 480,182 Q 520,240 560,308" fill="none" stroke="#5B8C5A" stroke-width="3" stroke-linecap="round"/>

  <!-- Mirror parabola: a<0, y_svg = 320 - 0.004*(x-320)^2 -->
  <!-- Key points: (120,160) (200,262) (280,314) (320,320) (360,314) (440,262) (520,160) -->
  <path d="M 120,160 Q 200,262 280,314 Q 320,340 360,314 Q 440,262 520,160" fill="none" stroke="#D6E5D2" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Vertex marker -->
  <circle cx="320" cy="80" r="5" fill="#C5A96A"/>

  <!-- Dashed guide lines from vertex -->
  <line x1="320" y1="80" x2="320" y2="280" stroke="#C5A96A" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="120" y1="80" x2="320" y2="80" stroke="#C5A96A" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Vertex label -->
  <text x="330" y="72" font-family="Georgia, serif" font-size="13" fill="#C5A96A" font-weight="bold">顶点</text>

  <!-- Symmetry axis label -->
  <text x="326" y="200" font-family="sans-serif" font-size="11" fill="#C5A96A" opacity="0.7">对称轴</text>

  <!-- Formula -->
  <text x="410" y="55" font-family="Georgia, serif" font-size="16" fill="#5B8C5A" font-style="italic">y = ax² + bx + c</text>

  <!-- a>0 / a<0 annotations -->
  <text x="440" y="310" font-family="sans-serif" font-size="12" fill="#5B8C5A">a &gt; 0</text>
  <text x="440" y="175" font-family="sans-serif" font-size="12" fill="#B8CBB5">a &lt; 0</text>

  <!-- Decorative bamboo leaves (top-right corner) -->
  <g transform="translate(575, 48) scale(0.45)" opacity="0.18">
    <path d="M 0,0 Q 15,-30 5,-60 Q 20,-40 30,-20 Q 15,-10 0,0 Z" fill="#5B8C5A"/>
    <path d="M 8,8 Q 28,-18 22,-48 Q 38,-28 42,-8 Q 26,2 8,8 Z" fill="#5B8C5A"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="608" height="368" rx="8" fill="none" stroke="#5B8C5A" stroke-width="1" opacity="0.12"/>
</svg>