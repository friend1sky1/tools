<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>柱·锥·台·球 — 青竹数苑</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   柱锥台球 — Three.js 版 · 竹林小轩风格
   ══════════════════════════════════════════ */
:root {
    --bamboo:       #5B8C5A;
    --bamboo-dark:  #2D4A32;
    --bamboo-mist:  #F0F5EE;
    --bamboo-light: #D6E5D2;
    --wood-gold:    #C5A96A;
    --text-primary: #2D3A2E;
    --text-secondary:#6B7D6C;
    --text-muted:   #9AAB9B;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: var(--bamboo-mist);
    font-family: -apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    overflow:hidden;
    user-select:none; -webkit-user-select:none;
}

/* ── 顶部导航 ── */
.top-bar {
    height:48px;
    background:rgba(240,245,238,0.92);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(91,140,90,0.10);
    display:flex; align-items:center;
    padding:0 16px; flex-shrink:0; z-index:30; gap:10px;
}
.top-bar a {
    display:flex; align-items:center; gap:5px;
    text-decoration:none; color:var(--bamboo-dark);
    font-size:14px; font-weight:500;
    padding:4px 10px; border-radius:8px;
    transition:background 0.2s;
}
.top-bar a:hover { background:rgba(91,140,90,0.08); }
.page-title {
    font-family:'Noto Serif SC',serif;
    font-size:15px; font-weight:700;
    color:var(--bamboo-dark);
    letter-spacing:1px; margin-left:4px;
}

/* ── 3D 视图区 ── */
#three-container {
    flex:1; position:relative; overflow:hidden;
    background:linear-gradient(180deg, #F7FAF6 0%, #EDF4EB 100%);
}
#three-container canvas {
    display:block;
    touch-action: none;
}

/* ── 形状切换按钮 ── */
.shape-tabs {
    display:flex; justify-content:center; gap:8px;
    padding:10px 16px 6px;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-top:1px solid rgba(91,140,90,0.08);
    flex-shrink:0;
}
.shape-btn {
    display:flex; align-items:center; gap:6px;
    padding:8px 18px;
    border:1.5px solid var(--bamboo-light);
    border-radius:20px; background:#fff;
    color:var(--text-secondary);
    font-size:14px; font-weight:500;
    cursor:pointer; transition:all 0.25s;
    outline:none; -webkit-tap-highlight-color:transparent;
}
.shape-btn .dot {
    width:8px; height:8px; border-radius:50%;
    flex-shrink:0; transition:transform 0.25s;
}
.shape-btn:hover { border-color:var(--bamboo); background:rgba(91,140,90,0.04); }
.shape-btn.active {
    border-color:var(--bamboo);
    background:rgba(91,140,90,0.08);
    color:var(--bamboo-dark); font-weight:600;
    box-shadow:0 0 0 3px rgba(91,140,90,0.10);
}
.shape-btn.active .dot { transform:scale(1.3); }

/* ── 参数栏 ── */
.param-bar {
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    padding:8px 20px 14px;
    display:flex; align-items:center; justify-content:center;
    gap:20px; flex-shrink:0;
    border-top:1px solid rgba(91,140,90,0.06);
    min-height:48px; flex-wrap:wrap;
}
.param-group { display:flex; align-items:center; gap:8px; }
.param-label {
    font-size:13px; font-weight:600;
    color:var(--text-secondary); white-space:nowrap;
    font-family:'Georgia','Noto Serif SC',serif;
}
.param-slider {
    width:90px; height:4px;
    -webkit-appearance:none; appearance:none;
    background:var(--bamboo-light);
    border-radius:2px; outline:none; cursor:pointer;
}
.param-slider::-webkit-slider-thumb {
    -webkit-appearance:none;
    width:18px; height:18px; border-radius:50%;
    background:var(--bamboo);
    border:2.5px solid #fff;
    box-shadow:0 1px 6px rgba(45,74,50,0.25);
    cursor:pointer; transition:transform 0.15s;
}
.param-slider::-webkit-slider-thumb:hover { transform:scale(1.15); }
.param-val {
    font-size:13px; font-weight:700;
    color:var(--bamboo); min-width:30px; text-align:center;
    font-family:'Georgia','Noto Serif SC',serif;
}
.param-divider {
    width:1px; height:22px;
    background:rgba(91,140,90,0.12);
}

/* ── 透明度 ── */
.opacity-group {
    display:flex; align-items:center; gap:6px;
    margin-left:8px; padding-left:14px;
    border-left:1px solid rgba(91,140,90,0.12);
}
.opacity-icon { font-size:14px; opacity:0.5; }

/* ── 提示文字 ── */
.hint-text {
    position:absolute; bottom:12px; left:50%;
    transform:translateX(-50%);
    font-size:12px; color:var(--text-muted);
    pointer-events:none; opacity:0.6;
    white-space:nowrap;
}

/* ── 响应式 ── */
@media (max-width:600px) {
    .shape-tabs { gap:5px; padding:8px 10px 4px; }
    .shape-btn { padding:7px 12px; font-size:13px; gap:4px; }
    .shape-btn .dot { width:7px; height:7px; }
    .param-bar { padding:6px 12px 10px; gap:14px; }
    .param-slider { width:64px; }
    .top-bar { padding:0 10px; }
    .page-title { font-size:14px; }
}
@media (max-width:380px) {
    .shape-btn { padding:6px 10px; font-size:12px; }
    .param-slider { width:50px; }
}
</style>
</head>
<body>

<div class="top-bar">
    <a href="index.html">
        <span style="font-size:16px;line-height:1">←</span>
        <span>返回</span>
    </a>
    <span class="page-title">柱 · 锥 · 台 · 球</span>
</div>

<div id="three-container">
    <span class="hint-text" id="hint">拖拽旋转 · 双指缩放</span>
</div>

<div class="shape-tabs">
    <button class="shape-btn active" data-shape="cylinder">
        <span class="dot" style="background:#5B8C5A"></span>圆柱
    </button>
    <button class="shape-btn" data-shape="cone">
        <span class="dot" style="background:#C5A96A"></span>圆锥
    </button>
    <button class="shape-btn" data-shape="frustum">
        <span class="dot" style="background:#7BA87A"></span>圆台
    </button>
    <button class="shape-btn" data-shape="sphere">
        <span class="dot" style="background:#7BA8B4"></span>球
    </button>
</div>

<div class="param-bar">
    <div class="param-group" id="pg-r1">
        <span class="param-label" id="lbl-r1">r</span>
        <input type="range" class="param-slider" id="sld-r1"
               min="0.3" max="1.8" step="0.1" value="0.9">
        <span class="param-val" id="val-r1">1.6</span>
    </div>
    <div class="param-divider" id="div-mid"></div>
    <div class="param-group" id="pg-r2">
        <span class="param-label" id="lbl-r2">h</span>
        <input type="range" class="param-slider" id="sld-r2"
               min="0.4" max="2.4" step="0.1" value="1.6">
        <span class="param-val" id="val-r2">2.4</span>
    </div>
    <div class="opacity-group">
        <span class="opacity-icon">◐</span>
        <input type="range" class="param-slider" id="sld-opacity"
               min="0.1" max="0.9" step="0.05" value="0.45">
    </div>
</div>

<!-- Three.js ES Modules -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
// ============================================================
//  Three.js 柱锥台球
// ============================================================

// ── 颜色常量 ──
const CLR = {
    cylinder:  0x5B8C5A,
    cone:      0xC5A96A,
    frustum:   0x7BA87A,
    sphere:    0x7BA8B4,
    wire:      0x5B8C5A,
    wireLight: 0xA8C8A6,
    axis:      0x999999,
    gold:      0xC5A96A,
    grid:      0xD6E5D2,
};

// ── 参数 ──
const P = {
    cylinder: { r: 0.9, h: 1.6 },
    cone:     { r: 1.0, h: 1.8 },
    frustum:  { r1: 0.5, r2: 1.0, h: 1.4 },
    sphere:   { R: 1.0 }
};

let activeShape = 'cylinder';
let opacity = 0.45;

// ── 场景搭建 ──
const container = document.getElementById('three-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(28, 1, 0.1, 100);
camera.position.set(3, 5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
container.appendChild(renderer.domElement);

// ── 控制器 ──
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 4;
controls.maxDistance = 14;
controls.target.set(0, 1, 0);

// ── 光照 ──
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 8, 6);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
dirLight2.position.set(-3, 4, -4);
scene.add(dirLight2);

// ── 地面网格 ──
const gridHelper = new THREE.GridHelper(8, 16, CLR.grid, CLR.grid);
gridHelper.material.opacity = 0.3;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// ── 图形容器 ──
const shapeGroup = new THREE.Group();
scene.add(shapeGroup);

// ── 辅助函数 ──
function clearGroup(group) {
    while (group.children.length) {
        const child = group.children[0];
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
        }
        group.remove(child);
    }
}

// 创建虚线圆
function dashedCircle(radius, y, color, segments) {
    segments = segments || 64;
    const pts = [];
    for (let i = 0; i <= segments; i++) {
        const a = (i / segments) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a) * radius, y, Math.sin(a) * radius));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineDashedMaterial({
        color: color, dashSize: 0.15, gapSize: 0.1, linewidth: 1
    });
    const line = new THREE.Line(geo, mat);
    line.computeLineDistances();
    return line;
}

// 创建实线段
function solidLine(p1, p2, color, lw) {
    const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(p1[0], p1[1], p1[2]),
        new THREE.Vector3(p2[0], p2[1], p2[2])
    ]);
    const mat = new THREE.LineBasicMaterial({ color: color, linewidth: lw || 2 });
    return new THREE.Line(geo, mat);
}

// 创建虚线段
function dashedLine(p1, p2, color) {
    const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(p1[0], p1[1], p1[2]),
        new THREE.Vector3(p2[0], p2[1], p2[2])
    ]);
    const mat = new THREE.LineDashedMaterial({
        color: color, dashSize: 0.12, gapSize: 0.08, linewidth: 1
    });
    const line = new THREE.Line(geo, mat);
    line.computeLineDistances();
    return line;
}

// 创建半透明实体 + 线框
function solidWithWire(geometry, color, op) {
    const group = new THREE.Group();
    // 半透明实体
    const solidMat = new THREE.MeshPhongMaterial({
        color: color,
        transparent: true,
        opacity: op,
        side: THREE.DoubleSide,
        shininess: 30,
        depthWrite: false
    });
    group.add(new THREE.Mesh(geometry, solidMat));
    // 线框
    const wireGeo = new THREE.WireframeGeometry(geometry);
    const wireMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
    group.add(new THREE.LineSegments(wireGeo, wireMat));
    return group;
}

// ── 构建函数 ──
function buildCylinder() {
    const r = P.cylinder.r, h = P.cylinder.h;
    // 底面圆
    const botGeo = new THREE.CircleGeometry(r, 64);
    const bot = solidWithWire(botGeo, CLR.cylinder, opacity);
    bot.rotation.x = -Math.PI / 2;
    shapeGroup.add(bot);
    // 顶面圆
    const topGeo = new THREE.CircleGeometry(r, 64);
    const top = solidWithWire(topGeo, CLR.cylinder, opacity);
    top.rotation.x = -Math.PI / 2;
    top.position.y = h;
    shapeGroup.add(top);
    // 侧面
    const sideGeo = new THREE.CylinderGeometry(r, r, h, 64, 1, true);
    const side = solidWithWire(sideGeo, CLR.cylinder, opacity * 0.7);
    side.position.y = h / 2;
    shapeGroup.add(side);
    // 母线（金色实线）
    shapeGroup.add(solidLine([r, 0, 0], [r, h, 0], CLR.gold, 3));
    // 轴线（虚线）
    shapeGroup.add(dashedLine([0, 0, 0], [0, h, 0], CLR.axis));
    // 底面半径标注
    shapeGroup.add(dashedLine([0, 0, 0], [r, 0, 0], CLR.wireLight));
    // 底面直径透视线
    shapeGroup.add(dashedLine([-r, 0, 0], [r, 0, 0], CLR.wireLight));
    shapeGroup.add(dashedLine([0, 0, -r], [0, 0, r], CLR.wireLight));
    // 顶面直径透视线
    shapeGroup.add(dashedLine([-r, h, 0], [r, h, 0], CLR.wireLight));
    shapeGroup.add(dashedLine([0, h, -r], [0, h, r], CLR.wireLight));
    // 高度标注线
    shapeGroup.add(dashedLine([r * 1.3, 0, 0], [r * 1.3, h, 0], CLR.wireLight));
}

function buildCone() {
    const r = P.cone.r, h = P.cone.h;
    // 底面
    const botGeo = new THREE.CircleGeometry(r, 64);
    const bot = solidWithWire(botGeo, CLR.cone, opacity);
    bot.rotation.x = -Math.PI / 2;
    shapeGroup.add(bot);
    // 侧面
    const sideGeo = new THREE.ConeGeometry(r, h, 64, 1, true);
    const side = solidWithWire(sideGeo, CLR.cone, opacity * 0.7);
    side.position.y = h / 2;
    shapeGroup.add(side);
    // 母线（金色实线，正面）
    shapeGroup.add(solidLine([r, 0, 0], [0, h, 0], CLR.gold, 3));
    // 对称母线（虚线）
    shapeGroup.add(dashedLine([-r, 0, 0], [0, h, 0], CLR.wireLight));
    shapeGroup.add(dashedLine([0, 0, r], [0, h, 0], CLR.wireLight));
    shapeGroup.add(dashedLine([0, 0, -r], [0, h, 0], CLR.wireLight));
    // 轴线
    shapeGroup.add(dashedLine([0, 0, 0], [0, h, 0], CLR.axis));
    // 底面直径
    shapeGroup.add(dashedLine([-r, 0, 0], [r, 0, 0], CLR.wireLight));
    shapeGroup.add(dashedLine([0, 0, -r], [0, 0, r], CLR.wireLight));
    // 高度标注
    shapeGroup.add(dashedLine([r * 1.3, 0, 0], [r * 1.3, h, 0], CLR.wireLight));
}

function buildFrustum() {
    const r1 = P.frustum.r1, r2 = P.frustum.r2, h = P.frustum.h;
    // 底面（大圆）
    const botGeo = new THREE.CircleGeometry(r2, 64);
    const bot = solidWithWire(botGeo, CLR.frustum, opacity);
    bot.rotation.x = -Math.PI / 2;
    shapeGroup.add(bot);
    // 顶面（小圆）
    const topGeo = new THREE.CircleGeometry(r1, 64);
    const top = solidWithWire(topGeo, CLR.frustum, opacity);
    top.rotation.x = -Math.PI / 2;
    top.position.y = h;
    shapeGroup.add(top);
    // 侧面
    const sideGeo = new THREE.CylinderGeometry(r1, r2, h, 64, 1, true);
    const side = solidWithWire(sideGeo, CLR.frustum, opacity * 0.7);
    side.position.y = h / 2;
    shapeGroup.add(side);
    // 母线（金色实线）
    shapeGroup.add(solidLine([r2, 0, 0], [r1, h, 0], CLR.gold, 3));
    // 对称母线（虚线）
    shapeGroup.add(dashedLine([-r2, 0, 0], [-r1, h, 0], CLR.wireLight));
    shapeGroup.add(dashedLine([0, 0, r2], [0, h, r1], CLR.wireLight));
    shapeGroup.add(dashedLine([0, 0, -r2], [0, h, -r1], CLR.wireLight));
    // 轴线
    shapeGroup.add(dashedLine([0, 0, 0], [0, h, 0], CLR.axis));
    // 底面直径
    shapeGroup.add(dashedLine([-r2, 0, 0], [r2, 0, 0], CLR.wireLight));
    shapeGroup.add(dashedLine([0, 0, -r2], [0, 0, r2], CLR.wireLight));
    // 顶面直径
    shapeGroup.add(dashedLine([-r1, h, 0], [r1, h, 0], CLR.wireLight));
    shapeGroup.add(dashedLine([0, h, -r1], [0, h, r1], CLR.wireLight));
    // 高度标注
    shapeGroup.add(dashedLine([r2 * 1.3, 0, 0], [r2 * 1.3, h, 0], CLR.wireLight));
}

function buildSphere() {
    const R = P.sphere.R;
    const cy = 1.0; // 球心居中（视图中心）
    // 球体
    const sphGeo = new THREE.SphereGeometry(R, 64, 32);
    const sph = solidWithWire(sphGeo, CLR.sphere, opacity * 0.55);
    sph.position.y = cy;
    shapeGroup.add(sph);
    // 赤道大圆（金色实线）
    const eqPts = [];
    for (let i = 0; i <= 128; i++) {
        const a = (i / 128) * Math.PI * 2;
        eqPts.push(new THREE.Vector3(Math.cos(a) * R, cy, Math.sin(a) * R));
    }
    const eqGeo = new THREE.BufferGeometry().setFromPoints(eqPts);
    const eqMat = new THREE.LineBasicMaterial({ color: CLR.gold, linewidth: 2 });
    shapeGroup.add(new THREE.Line(eqGeo, eqMat));
    // 经线1（虚线）
    shapeGroup.add(dashedCircle(R, cy, CLR.wireLight, 128));
    // 经线2（旋转90°，虚线）
    const mer2 = dashedCircle(R, cy, CLR.wireLight, 128);
    mer2.rotation.y = Math.PI / 2;
    shapeGroup.add(mer2);
    // 半径标注
    shapeGroup.add(solidLine([0, cy, 0], [R, cy, 0], CLR.gold, 2));
}

// ── 构建当前形状 ──
function buildShape(name) {
    clearGroup(shapeGroup);
    switch (name) {
        case 'cylinder': buildCylinder(); break;
        case 'cone':     buildCone(); break;
        case 'frustum':  buildFrustum(); break;
        case 'sphere':   buildSphere(); break;
    }
}

// ── 切换形状 ──
function switchShape(name) {
    if (name === activeShape) return;
    activeShape = name;
    document.querySelectorAll('.shape-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.shape === name);
    });
    buildShape(name);
    updateParamUI();
}

// ── 参数 UI 同步 ──
function updateParamUI() {
    const lbl1 = document.getElementById('lbl-r1');
    const lbl2 = document.getElementById('lbl-r2');
    const sld1 = document.getElementById('sld-r1');
    const sld2 = document.getElementById('sld-r2');
    const pg2  = document.getElementById('pg-r2');
    const divM = document.getElementById('div-mid');

    if (activeShape === 'sphere') {
        lbl1.textContent = 'R';
        sld1.min = 0.5; sld1.max = 2.0; sld1.step = 0.1;
        sld1.value = P.sphere.R;
        document.getElementById('val-r1').textContent = P.sphere.R.toFixed(1);
        pg2.style.display = 'none';
        divM.style.display = 'none';
    } else if (activeShape === 'frustum') {
        lbl1.textContent = 'r₁';
        sld1.min = 0.2; sld1.max = 1.5; sld1.step = 0.1;
        sld1.value = P.frustum.r1;
        document.getElementById('val-r1').textContent = P.frustum.r1.toFixed(1);
        lbl2.textContent = 'r₂';
        sld2.min = 0.4; sld2.max = 1.8; sld2.step = 0.1;
        sld2.value = P.frustum.r2;
        document.getElementById('val-r2').textContent = P.frustum.r2.toFixed(1);
        pg2.style.display = 'flex';
        divM.style.display = 'block';
    } else {
        lbl1.textContent = 'r';
        sld1.min = 0.3; sld1.max = 1.8; sld1.step = 0.1;
        sld1.value = P[activeShape].r;
        document.getElementById('val-r1').textContent = P[activeShape].r.toFixed(1);
        lbl2.textContent = 'h';
        sld2.min = 0.4; sld2.max = 2.4; sld2.step = 0.1;
        sld2.value = P[activeShape].h;
        document.getElementById('val-r2').textContent = P[activeShape].h.toFixed(1);
        pg2.style.display = 'flex';
        divM.style.display = 'block';
    }
}

// ── 滑条交互 ──
let debounce = null;

function onSliderInput() {
    const v1 = parseFloat(document.getElementById('sld-r1').value);
    const v2 = parseFloat(document.getElementById('sld-r2').value);
    document.getElementById('val-r1').textContent = v1.toFixed(1);
    document.getElementById('val-r2').textContent = v2.toFixed(1);

    if (activeShape === 'sphere') P.sphere.R = v1;
    else if (activeShape === 'frustum') { P.frustum.r1 = v1; P.frustum.r2 = v2; }
    else { P[activeShape].r = v1; P[activeShape].h = v2; }

    clearTimeout(debounce);
    debounce = setTimeout(() => buildShape(activeShape), 60);
}

function onOpacityInput() {
    opacity = parseFloat(document.getElementById('sld-opacity').value);
    clearTimeout(debounce);
    debounce = setTimeout(() => buildShape(activeShape), 60);
}

// ── 响应式 ──
function onResize() {
    const w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ── 检测触屏，更新提示文字 ──
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isTouchDevice) {
    document.getElementById('hint').textContent = '拖拽旋转 · 双指缩放';
} else {
    document.getElementById('hint').textContent = '拖拽旋转 · 滚轮缩放';
}

// ── 动画循环 ──
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

// ── 事件绑定 ──
document.querySelectorAll('.shape-btn').forEach(btn => {
    btn.addEventListener('click', () => switchShape(btn.dataset.shape));
});
document.getElementById('sld-r1').addEventListener('input', onSliderInput);
document.getElementById('sld-r2').addEventListener('input', onSliderInput);
document.getElementById('sld-opacity').addEventListener('input', onOpacityInput);

// ── 启动 ──
onResize();
buildShape('cylinder');
updateParamUI();
animate();
</script>
</body>
</html>
