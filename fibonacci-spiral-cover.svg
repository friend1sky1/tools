<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C5A040"/>
      <stop offset="30%" stop-color="#D4B860"/>
      <stop offset="60%" stop-color="#E8D080"/>
      <stop offset="100%" stop-color="#C5A040"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A7B7C"/>
      <stop offset="50%" stop-color="#3A9B9C"/>
      <stop offset="100%" stop-color="#2A7B7C"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8D080"/>
      <stop offset="40%" stop-color="#F0E0A0"/>
      <stop offset="100%" stop-color="#C5A040"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="640" height="400" fill="#FFFFFF" rx="12"/>

  <!-- Outer concentric frame circles -->
  <g fill="none" stroke-width="1.5" opacity="0.5">
    <circle cx="320" cy="200" r="175" stroke="#D4B860"/>
    <circle cx="320" cy="200" r="170" stroke="#3A9B9C"/>
    <circle cx="320" cy="200" r="165" stroke="#D4B860"/>
  </g>

  <!-- Main spiral - gold and teal dual-color -->
  <g transform="translate(320, 200)">
    <!-- Teal layer (behind, slightly offset) -->
    <path d="M 0,0
      C 0,-8 -5,-15 -12,-18
      C -22,-22 -32,-16 -36,-6
      C -40,6 -34,20 -22,26
      C -8,34 10,32 22,22
      C 36,10 42,-10 34,-26
      C 24,-44 -2,-54 -24,-48
      C -48,-38 -56,-10 -46,18
      C -34,48 4,62 36,54
      C 66,44 76,10 64,-22
      C 50,-56 14,-72 -22,-66
      C -60,-58 -78,-20 -68,22
      C -56,64 -14,88 30,82
      C 72,74 96,32 84,-14
      C 70,-60 28,-90 -20,-86"
      fill="none" stroke="url(#teal)" stroke-width="22" stroke-linecap="round" opacity="0.85"/>

    <!-- Gold layer (on top, slightly offset) -->
    <path d="M 0,0
      C 0,-8 -5,-15 -12,-18
      C -22,-22 -32,-16 -36,-6
      C -40,6 -34,20 -22,26
      C -8,34 10,32 22,22
      C 36,10 42,-10 34,-26
      C 24,-44 -2,-54 -24,-48
      C -48,-38 -56,-10 -46,18
      C -34,48 4,62 36,54
      C 66,44 76,10 64,-22
      C 50,-56 14,-72 -22,-66
      C -60,-58 -78,-20 -68,22
      C -56,64 -14,88 30,82
      C 72,74 96,32 84,-14
      C 70,-60 28,-90 -20,-86"
      fill="none" stroke="url(#goldShine)" stroke-width="18" stroke-linecap="round" opacity="0.9"/>

    <!-- Bright gold highlight on spiral -->
    <path d="M 0,0
      C 0,-8 -5,-15 -12,-18
      C -22,-22 -32,-16 -36,-6
      C -40,6 -34,20 -22,26
      C -8,34 10,32 22,22
      C 36,10 42,-10 34,-26
      C 24,-44 -2,-54 -24,-48
      C -48,-38 -56,-10 -46,18
      C -34,48 4,62 36,54
      C 66,44 76,10 64,-22
      C 50,-56 14,-72 -22,-66
      C -60,-58 -78,-20 -68,22
      C -56,64 -14,88 30,82
      C 72,74 96,32 84,-14
      C 70,-60 28,-90 -20,-86"
      fill="none" stroke="#F5EABB" stroke-width="6" stroke-linecap="round" opacity="0.4"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#D4B860"/>
    <circle cx="0" cy="0" r="3" fill="#F0E0A0"/>
  </g>

  <!-- Title -->
  <text x="320" y="36" fill="#2D4A32" font-family="'Noto Serif SC', serif" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="4" opacity="0.7">斐波那契螺旋线</text>
</svg>
