<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <!-- Aged paper background -->
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="3" result="noise"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.88  0 0 0 0 0.94  0 0 0 0 0.86  0 0 0 0.12 0" in="noise" result="tinted"/>
      <feBlend in="SourceGraphic" in2="tinted" mode="multiply"/>
    </filter>
    <!-- Paper grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="soft-light" result="grained"/>
    </filter>
    <!-- Orange ribbon gradient -->
    <linearGradient id="orangeRibbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4763C"/>
      <stop offset="35%" stop-color="#E8945A"/>
      <stop offset="65%" stop-color="#C86B30"/>
      <stop offset="100%" stop-color="#A85520"/>
    </linearGradient>
    <!-- Teal ribbon gradient -->
    <linearGradient id="tealRibbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A8B8C"/>
      <stop offset="50%" stop-color="#3A7B7C"/>
      <stop offset="100%" stop-color="#2A6B6C"/>
    </linearGradient>
    <!-- Ribbon highlight -->
    <linearGradient id="ribbonHL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Shadow for 3D effect -->
    <filter id="ribbonShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#3a2a1a" flood-opacity="0.25"/>
    </filter>
    <!-- Fine line style -->
    <filter id="fineLine">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <!-- Grid line style -->
    <style>
      .grid-line { stroke: #9AAB9B; stroke-width: 0.4; opacity: 0.35; }
      .grid-line-major { stroke: #6B7D6C; stroke-width: 0.6; opacity: 0.45; }
      .construction-line { stroke: #9AAB9B; stroke-width: 0.3; opacity: 0.25; stroke-dasharray: 4 3; }
      .spiral-guide { stroke: #6B7D6C; stroke-width: 0.5; opacity: 0.4; fill: none; }
      .radial-line { stroke: #6B7D6C; stroke-width: 0.3; opacity: 0.2; }
    </style>
  </defs>

  <!-- Aged paper background -->
  <rect width="640" height="400" fill="#F0F5EE" rx="4"/>
  <rect width="640" height="400" fill="#E2EDE0" rx="4" filter="url(#paper)" opacity="0.6"/>
  <!-- Subtle border -->
  <rect width="640" height="400" rx="4" fill="none" stroke="#B8D4B2" stroke-width="8" opacity="0.3"/>
  <rect x="2" y="2" width="636" height="396" rx="3" fill="none" stroke="#A8C4A2" stroke-width="1" opacity="0.4"/>

  <!-- === SQUARE GRID === -->
  <g>
    <!-- Horizontal grid lines -->
    <line x1="40" y1="60" x2="600" y2="60" class="grid-line"/>
    <line x1="40" y1="100" x2="600" y2="100" class="grid-line"/>
    <line x1="40" y1="140" x2="600" y2="140" class="grid-line"/>
    <line x1="40" y1="180" x2="600" y2="180" class="grid-line"/>
    <line x1="40" y1="220" x2="600" y2="220" class="grid-line-major"/>
    <line x1="40" y1="260" x2="600" y2="260" class="grid-line"/>
    <line x1="40" y1="300" x2="600" y2="300" class="grid-line"/>
    <line x1="40" y1="340" x2="600" y2="340" class="grid-line"/>
    <!-- Vertical grid lines -->
    <line x1="80" y1="30" x2="80" y2="370" class="grid-line"/>
    <line x1="120" y1="30" x2="120" y2="370" class="grid-line"/>
    <line x1="160" y1="30" x2="160" y2="370" class="grid-line"/>
    <line x1="200" y1="30" x2="200" y2="370" class="grid-line"/>
    <line x1="240" y1="30" x2="240" y2="370" class="grid-line"/>
    <line x1="280" y1="30" x2="280" y2="370" class="grid-line-major"/>
    <line x1="320" y1="30" x2="320" y2="370" class="grid-line"/>
    <line x1="360" y1="30" x2="360" y2="370" class="grid-line"/>
    <line x1="400" y1="30" x2="400" y2="370" class="grid-line"/>
    <line x1="440" y1="30" x2="440" y2="370" class="grid-line"/>
    <line x1="480" y1="30" x2="480" y2="370" class="grid-line"/>
    <line x1="520" y1="30" x2="520" y2="370" class="grid-line"/>
    <line x1="560" y1="30" x2="560" y2="370" class="grid-line"/>
  </g>

  <!-- === GOLDEN RECTANGLES (construction lines) === -->
  <g stroke="#5B8C5A" stroke-width="0.6" fill="none" opacity="0.25" stroke-dasharray="6 4">
    <!-- Main golden rectangle -->
    <rect x="120" y="80" width="400" height="247" rx="1"/>
    <!-- Square division -->
    <line x1="367" y1="80" x2="367" y2="327"/>
    <!-- Next division -->
    <line x1="367" y1="233" x2="520" y2="233"/>
    <!-- Smaller divisions -->
    <line x1="453" y1="233" x2="453" y2="327"/>
    <line x1="453" y1="280" x2="520" y2="280"/>
  </g>

  <!-- === TIGHT LOGARITHMIC SPIRAL at top (with radiating lines) === -->
  <g transform="translate(440, 130)">
    <!-- Radiating lines from spiral center -->
    <g class="radial-line" stroke="#9AAB9B">
      <line x1="0" y1="0" x2="-60" y2="-35"/>
      <line x1="0" y1="0" x2="-50" y2="-50"/>
      <line x1="0" y1="0" x2="-30" y2="-58"/>
      <line x1="0" y1="0" x2="-10" y2="-60"/>
      <line x1="0" y1="0" x2="15" y2="-55"/>
      <line x1="0" y1="0" x2="35" y2="-45"/>
      <line x1="0" y1="0" x2="50" y2="-25"/>
      <line x1="0" y1="0" x2="55" y2="0"/>
      <line x1="0" y1="0" x2="50" y2="25"/>
      <line x1="0" y1="0" x2="35" y2="45"/>
      <line x1="0" y1="0" x2="10" y2="55"/>
      <line x1="0" y1="0" x2="-20" y2="50"/>
      <line x1="0" y1="0" x2="-45" y2="30"/>
      <line x1="0" y1="0" x2="-55" y2="5"/>
    </g>
    <!-- Tight golden spiral -->
    <path d="M 0,0
      C -2,-8 -8,-15 -15,-18
      C -25,-22 -35,-18 -40,-10
      C -45,0 -42,15 -32,22
      C -20,32 0,32 15,25
      C 30,15 38,-5 32,-22
      C 22,-42 -5,-52 -28,-45
      C -52,-35 -60,-5 -50,22
      C -38,50 5,62 38,50
      C 65,35 70,-5 55,-38"
      fill="none" stroke="#C86B30" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <!-- Spiral center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#C86B30" opacity="0.6"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#C86B30" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- === 3D RIBBON SPIRAL (main visual) === -->
  <g filter="url(#ribbonShadow)">

    <!-- Outer ribbon segment 1 (orange, large arc going left-down) -->
    <path d="M 370,100
      C 250,100 140,160 130,270
      C 125,320 150,350 200,360
      L 210,340
      C 170,332 150,310 154,270
      C 162,180 255,120 365,120
      Z"
      fill="url(#orangeRibbon)" stroke="#A05520" stroke-width="0.5" opacity="0.9"/>
    <!-- Ribbon highlight -->
    <path d="M 370,100
      C 250,100 140,160 130,270
      C 125,320 150,350 200,360
      L 210,340
      C 170,332 150,310 154,270
      C 162,180 255,120 365,120
      Z"
      fill="url(#ribbonHL)" opacity="0.4"/>

    <!-- Ribbon segment 2 (teal, medium arc going right-down) -->
    <path d="M 365,120
      C 470,125 530,190 530,260
      C 530,310 500,340 460,350
      L 455,330
      C 485,322 508,300 510,260
      C 510,200 460,145 370,140
      Z"
      fill="url(#tealRibbon)" stroke="#2A5B5C" stroke-width="0.5" opacity="0.9"/>
    <path d="M 365,120
      C 470,125 530,190 530,260
      C 530,310 500,340 460,350
      L 455,330
      C 485,322 508,300 510,260
      C 510,200 460,145 370,140
      Z"
      fill="url(#ribbonHL)" opacity="0.3"/>

    <!-- Ribbon segment 3 (orange, smaller arc going left-up) -->
    <path d="M 370,140
      C 290,142 230,190 225,250
      C 222,290 240,310 270,315
      L 272,295
      C 252,292 240,278 242,252
      C 246,200 298,162 368,158
      Z"
      fill="url(#orangeRibbon)" stroke="#A05520" stroke-width="0.5" opacity="0.85"/>
    <path d="M 370,140
      C 290,142 230,190 225,250
      C 222,290 240,310 270,315
      L 272,295
      C 252,292 240,278 242,252
      C 246,200 298,162 368,158
      Z"
      fill="url(#ribbonHL)" opacity="0.35"/>

    <!-- Ribbon segment 4 (teal, small arc going right) -->
    <path d="M 368,158
      C 430,160 470,200 472,245
      C 474,275 458,295 435,300
      L 432,282
      C 448,278 456,265 455,245
      C 453,210 422,178 370,176
      Z"
      fill="url(#tealRibbon)" stroke="#2A5B5C" stroke-width="0.5" opacity="0.85"/>
    <path d="M 368,158
      C 430,160 470,200 472,245
      C 474,275 458,295 435,300
      L 432,282
      C 448,278 456,265 455,245
      C 453,210 422,178 370,176
      Z"
      fill="url(#ribbonHL)" opacity="0.3"/>

    <!-- Ribbon segment 5 (orange, tiny spiral center) -->
    <path d="M 370,176
      C 330,178 300,205 298,235
      C 296,258 308,270 325,273
      L 326,258
      C 316,256 308,248 310,235
      C 312,215 335,194 368,192
      Z"
      fill="url(#orangeRibbon)" stroke="#A05520" stroke-width="0.5" opacity="0.8"/>

    <!-- Ribbon segment 6 (teal, smallest) -->
    <path d="M 368,192
      C 398,193 420,215 420,235
      C 420,252 408,262 392,264
      L 390,250
      C 400,248 406,242 406,234
      C 406,220 392,206 370,205
      Z"
      fill="url(#tealRibbon)" stroke="#2A5B5C" stroke-width="0.5" opacity="0.8"/>

    <!-- Center spiral eye -->
    <circle cx="370" cy="210" r="8" fill="#D4763C" stroke="#A05520" stroke-width="0.5" opacity="0.7"/>
    <circle cx="370" cy="210" r="4" fill="#E8945A" opacity="0.6"/>
    <circle cx="370" cy="210" r="1.5" fill="#F0F5EE"/>
  </g>

  <!-- === CONSTRUCTION MARKS (architectural detail) === -->
  <!-- Small crosshairs at key points -->
  <g stroke="#9AAB9B" stroke-width="0.4" opacity="0.3">
    <line x1="365" y1="95" x2="375" y2="95"/><line x1="370" y1="90" x2="370" y2="100"/>
    <line x1="125" y1="265" x2="135" y2="265"/><line x1="130" y1="260" x2="130" y2="270"/>
    <line x1="525" y1="255" x2="535" y2="255"/><line x1="530" y1="250" x2="530" y2="260"/>
  </g>

  <!-- Small dimension arrows (architectural drafting style) -->
  <g stroke="#9AAB9B" stroke-width="0.5" fill="none" opacity="0.3">
    <!-- Bottom dimension line -->
    <line x1="130" y1="358" x2="520" y2="358"/>
    <line x1="130" y1="355" x2="130" y2="361"/>
    <line x1="520" y1="355" x2="520" y2="361"/>
    <!-- Side dimension line -->
    <line x1="555" y1="100" x2="555" y2="350"/>
    <line x1="552" y1="100" x2="558" y2="100"/>
    <line x1="552" y1="350" x2="558" y2="350"/>
  </g>

  <!-- Fibonacci numbers along bottom -->
  <g font-family="serif" fill="#9AAB9B" font-size="10" opacity="0.5" text-anchor="middle">
    <text x="160" y="370">1</text>
    <text x="200" y="370">1</text>
    <text x="240" y="370">2</text>
    <text x="280" y="370">3</text>
    <text x="320" y="370">5</text>
    <text x="360" y="370">8</text>
    <text x="400" y="370">13</text>
    <text x="440" y="370">21</text>
  </g>

  <!-- φ symbol annotation -->
  <g font-family="serif" fill="#6B7D6C" opacity="0.5">
    <text x="540" y="370" font-size="14" font-style="italic" font-weight="bold">φ = 1.618…</text>
  </g>

  <!-- Title -->
  <text x="320" y="28" fill="#2D4A32" font-family="'Noto Serif SC', serif" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="4" opacity="0.7">斐波那契螺旋线</text>

  <!-- Signature mark (bottom right, like the reference) -->
  <g font-family="serif" fill="#9AAB9B" font-size="8" opacity="0.4" text-anchor="end">
    <text x="600" y="390">MathSeek · 青竹数苑</text>
  </g>

  <!-- Paper grain overlay -->
  <rect width="640" height="400" fill="none" rx="4" filter="url(#grain)" opacity="0.3"/>
</svg>
