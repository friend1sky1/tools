<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F5EE"/>
      <stop offset="100%" stop-color="#E2EDE0"/>
    </linearGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(45,74,50,0.08)"/>
      <stop offset="100%" stop-color="rgba(45,74,50,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#5B8C5A" stroke-width="0.5">
    <line x1="0" y1="80" x2="640" y2="80"/><line x1="0" y1="160" x2="640" y2="160"/>
    <line x1="0" y1="240" x2="640" y2="240"/><line x1="0" y1="320" x2="640" y2="320"/>
    <line x1="128" y1="0" x2="128" y2="400"/><line x1="256" y1="0" x2="256" y2="400"/>
    <line x1="384" y1="0" x2="384" y2="400"/><line x1="512" y1="0" x2="512" y2="400"/>
  </g>

  <!-- Fibonacci rectangles (golden ratio subdivision) -->
  <!-- Layout: starting from center-right, building outward -->
  <!-- The golden rectangles: each square side = Fibonacci number * scale -->

  <!-- Outer large rectangle (21 units) -->
  <rect x="130" y="60" width="340" height="210" fill="none" stroke="#B8D4B0" stroke-width="1.2" opacity="0.5" rx="2"/>

  <!-- 13-unit square (bottom-left of outer) -->
  <rect x="130" y="60" width="210" height="210" fill="#D6E5D2" opacity="0.25" rx="2"/>
  <rect x="130" y="60" width="210" height="210" fill="none" stroke="#A8C8A0" stroke-width="1" opacity="0.6" rx="2"/>

  <!-- 8-unit square (top-right of 13) -->
  <rect x="130" y="60" width="130" height="130" fill="#C4D8B0" opacity="0.3" rx="2"/>
  <rect x="130" y="60" width="130" height="130" fill="none" stroke="#90B888" stroke-width="1" opacity="0.6" rx="2"/>

  <!-- 5-unit square -->
  <rect x="260" y="60" width="80" height="80" fill="#D0D0A0" opacity="0.3" rx="2"/>
  <rect x="260" y="60" width="80" height="80" fill="none" stroke="#B8B888" stroke-width="1" opacity="0.6" rx="2"/>

  <!-- 3-unit square -->
  <rect x="260" y="140" width="50" height="50" fill="#D8C890" opacity="0.35" rx="2"/>
  <rect x="260" y="140" width="50" height="50" fill="none" stroke="#C0B078" stroke-width="1" opacity="0.6" rx="2"/>

  <!-- 2-unit square -->
  <rect x="310" y="140" width="30" height="30" fill="#E0D0A0" opacity="0.35" rx="2"/>
  <rect x="310" y="140" width="30" height="30" fill="none" stroke="#C8B888" stroke-width="1" opacity="0.6" rx="2"/>

  <!-- 1-unit square -->
  <rect x="310" y="170" width="20" height="20" fill="#E8D8B0" opacity="0.4" rx="2"/>
  <rect x="310" y="170" width="20" height="20" fill="none" stroke="#D0C098" stroke-width="1" opacity="0.6" rx="2"/>

  <!-- 1-unit square (second) -->
  <rect x="330" y="140" width="10" height="10" fill="#F0E0C0" opacity="0.4" rx="1"/>
  <rect x="330" y="140" width="10" height="10" fill="none" stroke="#D8C8A0" stroke-width="0.8" opacity="0.6" rx="1"/>

  <!-- Golden spiral (quarter-circle arcs in each square) -->
  <g fill="none" stroke="#C5A96A" stroke-width="2.5" stroke-linecap="round">
    <!-- 13-unit arc (bottom-left square, center at bottom-right corner) -->
    <path d="M 340,270 A 130,130 0 0,1 130,190" opacity="0.9"/>
    <!-- 8-unit arc (top-left square, center at top-right) -->
    <path d="M 130,190 A 80,80 0 0,1 260,60" opacity="0.9"/>
    <!-- 5-unit arc -->
    <path d="M 260,60 A 50,50 0 0,1 340,140" opacity="0.9"/>
    <!-- 3-unit arc -->
    <path d="M 340,140 A 30,30 0 0,1 310,170" opacity="0.9"/>
    <!-- 2-unit arc -->
    <path d="M 310,170 A 20,20 0 0,1 330,190" opacity="0.9"/>
    <!-- 1-unit arc -->
    <path d="M 330,190 A 10,10 0 0,1 340,180" opacity="0.9"/>
  </g>

  <!-- Fibonacci number labels -->
  <g font-family="serif" font-size="13" font-style="italic" fill="#6B7D6C" opacity="0.6">
    <text x="230" y="170" text-anchor="middle">13</text>
    <text x="190" y="130" text-anchor="middle">8</text>
    <text x="296" y="105" text-anchor="middle">5</text>
    <text x="282" y="170" text-anchor="middle">3</text>
    <text x="322" y="160" text-anchor="middle">2</text>
    <text x="318" y="185" text-anchor="middle">1</text>
  </g>

  <!-- Shadow -->
  <ellipse cx="320" cy="330" rx="120" ry="12" fill="url(#shadow)"/>

  <!-- Title -->
  <text x="320" y="36" fill="#5B8C5A" font-family="'Noto Serif SC', serif" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="4">斐波那契螺旋线</text>
  <line x1="250" y1="50" x2="390" y2="50" stroke="#C5A96A" stroke-width="1" opacity="0.4"/>

  <!-- Formula -->
  <text x="490" y="340" fill="#6B7D6C" font-family="serif" font-size="12" font-style="italic" opacity="0.5">F₁ = 1, F₂ = 1</text>
  <text x="490" y="358" fill="#6B7D6C" font-family="serif" font-size="12" font-style="italic" opacity="0.5">Fₙ = Fₙ₋₁ + Fₙ₋₂</text>

  <!-- Decorative accent -->
  <line x1="130" y1="280" x2="470" y2="280" stroke="#C5A96A" stroke-width="0.8" opacity="0.2"/>
</svg>
