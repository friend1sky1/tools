<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F5EE"/>
      <stop offset="100%" stop-color="#E2EDE0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8942A"/>
      <stop offset="30%" stop-color="#C5A96A"/>
      <stop offset="60%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#E0C890"/>
    </linearGradient>
    <linearGradient id="goldThin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C5A96A" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#C5A96A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C5A96A" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.45" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#C5A96A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C5A96A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(45,74,50,0.08)"/>
      <stop offset="100%" stop-color="rgba(45,74,50,0)"/>
    </radialGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#5B8C5A" stroke-width="0.5">
    <line x1="0" y1="80" x2="640" y2="80"/><line x1="0" y1="160" x2="640" y2="160"/>
    <line x1="0" y1="240" x2="640" y2="240"/><line x1="0" y1="320" x2="640" y2="320"/>
    <line x1="128" y1="0" x2="128" y2="400"/><line x1="256" y1="0" x2="256" y2="400"/>
    <line x1="384" y1="0" x2="384" y2="400"/><line x1="512" y1="0" x2="512" y2="400"/>
  </g>

  <!-- Soft golden glow behind spiral -->
  <ellipse cx="310" cy="200" rx="160" ry="120" fill="url(#glow)"/>

  <!-- Golden rectangles (very subtle, background structure) -->
  <g stroke="#C5A96A" stroke-width="0.6" fill="none" opacity="0.12">
    <!-- 21×13 outer rect -->
    <rect x="178" y="72" width="264" height="164" rx="1"/>
    <!-- 13×13 -->
    <rect x="178" y="72" width="164" height="164" rx="1"/>
    <!-- 8×8 -->
    <rect x="342" y="72" width="100" height="100" rx="1"/>
    <!-- 5×5 -->
    <rect x="342" y="172" width="62" height="62" rx="1"/>
    <!-- 3×3 -->
    <rect x="404" y="172" width="38" height="38" rx="1"/>
    <!-- 2×2 -->
    <rect x="404" y="210" width="24" height="24" rx="1"/>
    <!-- 1×1 -->
    <rect x="428" y="210" width="14" height="14" rx="1"/>
  </g>

  <!-- Golden spiral glow (wide, blurred) -->
  <path d="M 342,236
    A 164,164 0 0,1 178,72
    A 100,100 0 0,1 342,72
    A 62,62 0 0,1 404,172
    A 38,38 0 0,1 442,210
    A 24,24 0 0,1 428,234
    A 14,14 0 0,1 442,224"
    fill="none" stroke="#C5A96A" stroke-width="10" stroke-linecap="round"
    opacity="0.12"/>

  <!-- Golden spiral (main, thick, golden gradient) -->
  <path d="M 342,236
    A 164,164 0 0,1 178,72
    A 100,100 0 0,1 342,72
    A 62,62 0 0,1 404,172
    A 38,38 0 0,1 442,210
    A 24,24 0 0,1 428,234
    A 14,14 0 0,1 442,224"
    fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"
    filter="url(#goldGlow)"/>

  <!-- Second spiral trace (thinner, for depth) -->
  <path d="M 342,236
    A 164,164 0 0,1 178,72
    A 100,100 0 0,1 342,72
    A 62,62 0 0,1 404,172
    A 38,38 0 0,1 442,210
    A 24,24 0 0,1 428,234
    A 14,14 0 0,1 442,224"
    fill="none" stroke="#E8D8A0" stroke-width="1.5" stroke-linecap="round"
    opacity="0.4"/>

  <!-- Fibonacci number labels on each square -->
  <g font-family="'Noto Serif SC', serif" fill="#C5A96A" opacity="0.55" text-anchor="middle">
    <text x="260" y="162" font-size="20" font-weight="700" font-style="italic">13</text>
    <text x="392" y="128" font-size="16" font-weight="700" font-style="italic">8</text>
    <text x="373" y="208" font-size="13" font-weight="700" font-style="italic">5</text>
    <text x="423" y="196" font-size="11" font-weight="700" font-style="italic">3</text>
    <text x="416" y="226" font-size="10" font-weight="700" font-style="italic">2</text>
    <text x="435" y="222" font-size="9" font-weight="700" font-style="italic">1</text>
  </g>

  <!-- Decorative: golden ratio symbol at spiral center -->
  <circle cx="342" cy="236" r="4" fill="#C5A96A" opacity="0.6"/>
  <circle cx="342" cy="236" r="8" fill="none" stroke="#C5A96A" stroke-width="1" opacity="0.3"/>

  <!-- Shadow -->
  <ellipse cx="320" cy="340" rx="150" ry="10" fill="url(#shadow)"/>

  <!-- Title -->
  <text x="320" y="36" fill="#5B8C5A" font-family="'Noto Serif SC', serif" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="4">斐波那契螺旋线</text>
  <line x1="248" y1="50" x2="392" y2="50" stroke="#C5A96A" stroke-width="1" opacity="0.4"/>

  <!-- Formula at bottom right -->
  <text x="500" y="310" fill="#6B7D6C" font-family="serif" font-size="12" font-style="italic" opacity="0.5">F₁ = 1, F₂ = 1</text>
  <text x="500" y="328" fill="#6B7D6C" font-family="serif" font-size="12" font-style="italic" opacity="0.5">Fₙ = Fₙ₋₁ + Fₙ₋₂</text>
  <text x="500" y="350" fill="#C5A96A" font-family="serif" font-size="14" font-style="italic" opacity="0.7" font-weight="bold">φ = 1.618034…</text>

  <!-- Decorative thin golden line -->
  <line x1="120" y1="290" x2="480" y2="290" stroke="url(#goldThin)" stroke-width="1"/>
</svg>
