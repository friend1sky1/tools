<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>做T计算器</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --profit:      #E60012;
  --profit-bg:   #FEF0F0;
  --loss:        #2D8A4E;
  --loss-bg:     #EEF7F0;
  --gold:        #D4A843;
  --gold-light:  #FAF4E5;
  --bg:          #FBF6F0;
  --card:        #FFFFFF;
  --text:        #3D2E2E;
  --text-secondary: #8B7870;
  --text-muted:  #B8A8A0;
  --border:      #E8DCD0;
  --shadow-sm:   0 1px 3px rgba(0,0,0,0.04);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.05);
  --shadow-focus: 0 0 0 3px rgba(230,0,18,0.08);
  --radius:      12px;
  --transition:  0.15s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-variant-numeric: tabular-nums;
  -webkit-user-select: none;
  user-select: none;
}
.app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  max-width: 440px; margin: 0 auto;
  padding: 4px 10px 8px;
}
/* Header — compact */
.header {
  flex-shrink: 0; text-align: center; padding: 2px 0 4px;
  margin-bottom: 4px;
}
.header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.15rem; font-weight: 700; color: var(--profit);
  letter-spacing: 3px;
}

/* ──── Stock Tab Bar ──── */
.stock-tab-bar {
  flex-shrink: 0; display: flex; gap: 6px;
  margin-bottom: 6px; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.stock-tab-bar::-webkit-scrollbar { display: none; }
.stock-tab {
  flex-shrink: 0; padding: 6px 14px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 0.82rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
  color: var(--text-secondary); white-space: nowrap;
  font-family: inherit;
  position: relative;
}
.stock-tab.active {
  border-color: var(--profit); background: var(--profit-bg); color: var(--profit);
}
.stock-tab .del-stock {
  display: none; position: absolute; top: -6px; right: -6px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--text-muted); color: #FFF; font-size: 0.6rem;
  line-height: 18px; text-align: center; border: none; cursor: pointer;
}
.stock-tab.editing .del-stock { display: block; }
.stock-tab .del-stock:hover { background: var(--profit); }
.add-stock-btn {
  flex-shrink: 0; width: 36px; height: 36px;
  border-radius: 50%; border: 1.5px dashed var(--border);
  background: transparent; font-size: 1.1rem; color: var(--text-muted);
  cursor: pointer; transition: all var(--transition);
  display: flex; align-items: center; justify-content: center;
  font-family: inherit; line-height: 1;
}
.add-stock-btn:active { border-color: var(--profit); color: var(--profit); }

/* ──── Position Snapshot Row ──── */
.pos-snapshot {
  flex-shrink: 0; display: flex; gap: 8px; margin-bottom: 6px;
  font-size: 0.72rem; color: var(--text-secondary);
  background: var(--card); border-radius: 8px;
  padding: 5px 10px; box-shadow: var(--shadow-sm);
  align-items: center; justify-content: center; flex-wrap: wrap;
}
.pos-snapshot .snap-item { white-space: nowrap; }
.pos-snapshot .snap-val { font-weight: 700; color: var(--text); }
.pos-snapshot .snap-cost { color: var(--profit); }
.pos-snapshot .snap-val.profit { color: var(--profit); }
.pos-snapshot .snap-val.loss { color: var(--loss); }

/* Mode Toggle */
.mode-toggle {
  flex-shrink: 0; display: flex; gap: 6px; margin-bottom: 6px;
}
.mode-btn {
  flex: 1; padding: 7px 0; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
  color: var(--text-secondary); font-family: inherit;
}
.mode-btn.active {
  border-color: var(--profit); background: var(--profit-bg); color: var(--profit);
}

/* Scrollable Input Area */
.scroll-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.input-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow-card); padding: 10px 14px; margin-bottom: 8px;
}
.input-card h2 {
  font-size: 0.88rem; font-weight: 700; color: var(--profit);
  margin-bottom: 8px; padding-bottom: 5px;
  border-bottom: 1px dashed var(--border);
  font-family: 'Noto Serif SC', serif;
  display: flex; align-items: center; gap: 6px;
  letter-spacing: 2px;
  cursor: pointer; user-select: none;
}
.input-card h2 .icon { font-size: 0.9rem; }
.input-card h2 .arrow { font-size: 0.7rem; margin-left: auto; color: var(--text-muted); transition: transform 0.2s; }
.input-card h2 .arrow.open { transform: rotate(90deg); }

.input-card .fold-body { display: block; }
.input-card .fold-body.hidden { display: none; }

.input-row {
  display: grid; align-items: center;
  grid-template-columns: 84px 30px 1fr 30px 28px;
  gap: 6px; margin-bottom: 6px;
}
.input-row:last-child { margin-bottom: 0; }
.input-row label {
  font-size: 0.82rem; color: var(--text-secondary); white-space: nowrap;
  min-width: 84px; flex-shrink: 0; font-family: 'Noto Serif SC', serif;
}
.input-row input {
  flex: 1; min-width: 0;
  padding: 8px 10px; font-size: 0.95rem; font-weight: 500;
  border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text);
  text-align: right; transition: all var(--transition);
  -webkit-appearance: none; font-family: inherit;
  -webkit-user-select: text;
  user-select: text;
}
.input-row input:focus {
  outline: none; border-color: var(--profit); background: #FFF;
  box-shadow: var(--shadow-focus);
}
.input-row input:disabled {
  opacity: 0.4; background: #F5F5F5;
}
.input-row .unit {
  font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0; min-width: 20px; text-align: right;
}

/* Spin buttons */
.spin-btn {
  width: 30px; height: 36px; flex-shrink: 0;
  border: 1.5px solid var(--border); border-radius: 6px;
  background: var(--card); color: var(--text-secondary);
  font-size: 0.7rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); user-select: none;
  -webkit-user-select: none;
}
.spin-btn:active { background: var(--profit-bg); color: var(--profit); border-color: var(--profit); }
.spin-btn:disabled { opacity: 0.3; pointer-events: none; }

/* Highlight row for key input */
.input-row.key-row {
  background: var(--profit-bg);
  border-radius: 8px;
  padding: 4px 6px;
  margin: 0 -6px 6px;
}
.input-row.key-row input {
  border-color: var(--profit);
  background: #FFF;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--profit);
  touch-action: none;
}
.input-row.key-row label {
  font-weight: 700;
  color: var(--profit);
}
.input-row.key-row input.sliding {
  background: #FFF5F5;
  border-color: #CC0008;
}

/* Ref tag row */
#refTagRow {
  margin-top: 2px; margin-bottom: 0;
  padding-left: 88px;
  gap: 8px;
  display: flex; align-items: center;
}
#refTagRow .ref-tag { margin: 0; }

/* Ref tag */
.ref-tag {
  font-size: 0.76rem; color: var(--gold); white-space: nowrap;
  flex-shrink: 0; background: var(--gold-light);
  padding: 6px 16px; border-radius: 18px;
  cursor: pointer; border: 1.5px solid var(--gold);
  transition: all var(--transition); user-select: none;
  font-weight: 700; letter-spacing: 0.5px;
}
.ref-tag:hover { background: #FDF0D5; }
.ref-tag:active, .ref-tag.active { background: var(--gold); color: #FFF; }

/* Fee card */
.fee-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow-card); padding: 10px 14px; margin-bottom: 8px;
}
.fee-card h3 {
  font-size: 0.88rem; font-weight: 700; color: var(--text-secondary);
  margin-bottom: 6px; letter-spacing: 2px;
  font-family: 'Noto Serif SC', serif;
}
.fee-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
}
.fee-row:last-child { margin-bottom: 0; }
.fee-row label {
  font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; min-width: 54px;
  font-family: 'Noto Serif SC', serif;
}
.fee-row input {
  width: 60px; padding: 5px 6px; font-size: 0.84rem;
  border: 1.5px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text); text-align: right;
  font-family: inherit;
}
.fee-row input:focus {
  outline: none; border-color: var(--gold);
}
.fee-row .desc {
  font-size: 0.72rem; color: var(--text-muted); margin-left: 2px;
}
.fee-info {
  font-size: 0.7rem; color: var(--text-muted);
  margin-top: 4px; padding-top: 4px;
  border-top: 1px dotted var(--border);
  display: flex; flex-wrap: wrap; gap: 6px;
}
.fee-info span { white-space: nowrap; }

/* Calculate Button */
.calc-btn {
  width: 100%; padding: 12px;
  border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--profit), #B8000E);
  color: #FFF; font-size: 1rem; font-weight: 700;
  cursor: pointer; letter-spacing: 3px;
  margin-bottom: 8px; transition: all var(--transition);
  font-family: 'Noto Serif SC', serif;
}
.calc-btn:active { transform: scale(0.98); opacity: 0.9; }

/* Result Card */
.result-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow-card); padding: 14px;
  margin-bottom: 8px; display: none;
}
.result-card.show { display: block; border: 1.5px solid var(--gold); }
.result-card h2 {
  font-size: 0.88rem; font-weight: 700; color: var(--profit);
  margin-bottom: 8px; font-family: 'Noto Serif SC', serif;
  display: flex; align-items: center; gap: 6px;
}
.result-card h2 .icon { font-size: 0.9rem; }

.result-big {
  text-align: center; padding: 8px 0 10px;
  border-bottom: 1px dashed var(--border); margin-bottom: 8px;
  position: relative;
}
.result-big .label { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 1px; }
.result-big .value {
  font-size: 2rem; font-weight: 800; line-height: 1.15;
}
.result-big .value.profit { color: var(--profit); }
.result-big .value.loss { color: var(--loss); }
.result-big .pct {
  font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-top: 2px;
}

/* Copy button */
.copy-btn {
  position: absolute; top: 0; right: 0;
  font-size: 0.6rem; padding: 3px 8px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--card); color: var(--text-muted);
  cursor: pointer; transition: all var(--transition);
  font-family: inherit;
}
.copy-btn:active { background: var(--gold-light); color: var(--gold); }
.copy-btn.copied { color: var(--loss); border-color: var(--loss); }

.result-detail {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px;
}
.result-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 3px 0; font-size: 0.76rem;
}
.result-item .key { color: var(--text-secondary); }
.result-item .val { font-weight: 600; color: var(--text); }
.result-item.full { grid-column: 1 / -1; }

.new-cost {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px dashed var(--border);
  text-align: center;
}
.new-cost .label { font-size: 0.65rem; color: var(--text-muted); }
.new-cost .value {
  font-size: 1.2rem; font-weight: 800; color: var(--profit);
}

/* Footer */
.footer {
  flex-shrink: 0; text-align: center; padding: 2px 0 0;
  font-size: 0.55rem; color: var(--text-muted);
}

/* ──── Stock Edit Modal ──── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--card); border-radius: var(--radius);
  padding: 20px; width: 300px; max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.modal-box h3 {
  font-size: 1rem; font-weight: 700; color: var(--profit);
  margin-bottom: 12px; font-family: 'Noto Serif SC', serif;
}
.modal-box .field { margin-bottom: 10px; }
.modal-box .field label {
  display: block; font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 3px;
}
.modal-box .field input {
  width: 100%; padding: 8px 10px; font-size: 0.9rem;
  border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text); font-family: inherit;
}
.modal-box .field input:focus {
  outline: none; border-color: var(--profit);
}
.modal-actions {
  display: flex; gap: 8px; margin-top: 14px;
}
.modal-actions button {
  flex: 1; padding: 8px; border-radius: 8px; border: none;
  font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit;
}
.modal-actions .btn-save {
  background: var(--profit); color: #FFF;
}
.modal-actions .btn-cancel {
  background: var(--bg); color: var(--text-secondary);
}

@media (min-width: 440px) {
  .app {
    margin-top: 12px;
    margin-bottom: 12px;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>做T计算器</h1>
  </div>

  <!-- Stock Tab Bar -->
  <div class="stock-tab-bar" id="stockTabBar"></div>

  <!-- Position Snapshot -->
  <div class="pos-snapshot" id="posSnapshot"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeReverse" onclick="setMode('reverse')">倒T · 高抛低吸</button>
    <button class="mode-btn" id="modeNormal" onclick="setMode('normal')">正T · 先买后卖</button>
  </div>

  <div class="scroll-area" id="scrollArea">
    <!-- Position Card -->
    <div class="input-card" id="posCard">
      <h2 onclick="toggleFold('posCard')">
        <span class="icon">📊</span>持 仓 信 息
        <span class="arrow open" id="posArrow">▶</span>
      </h2>
      <div class="fold-body" id="posFold">
        <div class="input-row">
          <label>成本价</label>
          <span class="spin-btn" style="visibility:hidden">−</span>
          <input type="text" inputmode="decimal" id="costPrice" placeholder="" value="10.0000">
          <span class="spin-btn" style="visibility:hidden">+</span>
          <span class="unit">元</span>
        </div>
        <div class="input-row">
          <label>持仓数量</label>
          <span class="spin-btn" data-spin-id="holdQty" data-spin-delta="-100">−</span>
          <input type="text" inputmode="numeric" id="holdQty" placeholder="1000" value="1000"
            onchange="onHoldQtyChange()"
            ontouchstart="slideStart(event, this, holdQtyBounds, function(v){ }, 100)" onmousedown="slideStart(event, this, holdQtyBounds, function(v){ }, 100)">
          <span class="spin-btn" data-spin-id="holdQty" data-spin-delta="100">+</span>
          <span class="unit">股</span>
        </div>
      </div>
    </div>

    <!-- T Operation Card -->
    <div class="input-card" id="opCard">
      <h2><span class="icon">🔄</span><span id="opTitle">倒 T 操 作</span></h2>
      <div class="input-row">
        <label>开盘价</label>
        <span class="spin-btn" style="visibility:hidden">−</span>
        <input type="text" inputmode="decimal" id="openPrice" placeholder="" value="10.00" onchange="onOpenPriceChange()"
          ontouchstart="slideStart(event, this, openPriceBounds, function(v){ onSlideOpenPrice(v); })" onmousedown="slideStart(event, this, openPriceBounds, function(v){ onSlideOpenPrice(v); })">
        <span class="spin-btn" style="visibility:hidden">+</span>
        <span class="unit">元</span>
      </div>
      <div class="input-row key-row" id="tPrice1Row">
        <label id="tPrice1Label">卖出价</label>
        <span class="spin-btn" data-spin-id="tPrice1" data-spin-delta="-0.01">−</span>
        <input type="text" inputmode="decimal" id="tPrice1" placeholder="先卖价格" oninput="onSellPriceInput()"
          ontouchstart="slideStart(event, this, sellPriceBounds, function(v){ updateRefPrice(); })" onmousedown="slideStart(event, this, sellPriceBounds, function(v){ updateRefPrice(); })">
        <span class="spin-btn" data-spin-id="tPrice1" data-spin-delta="0.01">+</span>
        <span class="unit">元</span>
      </div>
      <div class="input-row">
        <label>操作股数</label>
        <span class="spin-btn" data-spin-id="tQty" data-spin-delta="-100">−</span>
        <input type="text" inputmode="numeric" id="tQty" placeholder="1000" value="1000"
          onchange="onTQtyChange()"
          ontouchstart="slideStart(event, this, tQtyBounds, function(v){ }, 100)" onmousedown="slideStart(event, this, tQtyBounds, function(v){ }, 100)">
        <span class="spin-btn" data-spin-id="tQty" data-spin-delta="100">+</span>
        <span class="unit">股</span>
      </div>
      <div class="input-row">
        <label id="expectLabel">预期接回价</label>
        <span class="spin-btn" data-spin-id="tPrice2" data-spin-delta="-0.01">−</span>
        <input type="text" inputmode="decimal" id="tPrice2" placeholder="" oninput="onBuybackInput()"
          ontouchstart="slideStart(event, this, buybackPriceBounds, function(v){ document.getElementById('tPrice2').dataset.autoSet='false'; })" onmousedown="slideStart(event, this, buybackPriceBounds, function(v){ document.getElementById('tPrice2').dataset.autoSet='false'; })">
        <span class="spin-btn" data-spin-id="tPrice2" data-spin-delta="0.01">+</span>
        <span class="unit">元</span>
      </div>
      <div class="input-row" id="refTagRow">
        <span class="ref-tag" id="refTag99" onclick="applyRatio(0.99)">0.99</span>
        <span class="ref-tag" id="refTag995" onclick="applyRatio(0.995)">0.995</span>
        <span class="ref-tag" id="refTag101" onclick="applyRatio(1.01)" style="display:none">1.01</span>
      </div>
    </div>

    <!-- Fee Card -->
    <div class="fee-card">
      <h3>💰 费 率 设 置</h3>
      <div class="fee-row">
        <label>佣金</label>
        <span class="desc">0.01854%</span>
        <span class="desc">（万1.854，最低5元）</span>
      </div>
      <div class="fee-info">
        <span>印花税 0.05%（卖出单向）</span>
        <span>过户费 0.001%（双向）</span>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()" id="calcBtn">💰 计算预估盈亏</button>

    <!-- Result Card -->
    <div class="result-card" id="resultCard">
      <h2><span class="icon">📋</span>预估结果</h2>
      <div class="result-big">
        <button class="copy-btn" onclick="copyResult()" id="copyBtn">复制</button>
        <div class="label">净盈亏</div>
        <div class="value" id="resultBig"></div>
        <div class="pct" id="resultPct"></div>
      </div>
      <div class="result-detail">
        <div class="result-item">
          <span class="key" id="op1Label">卖出收入</span><span class="val" id="op1Val">--</span>
        </div>
        <div class="result-item">
          <span class="key" id="op2Label">买入支出</span><span class="val" id="op2Val">--</span>
        </div>
        <div class="result-item">
          <span class="key">差价</span><span class="val" id="diffVal">--</span>
        </div>
        <div class="result-item">
          <span class="key">手续费合计</span><span class="val" id="feeTotal">--</span>
        </div>
        <div class="result-item full">
          <span class="key">佣金明细</span><span class="val" id="commDetail">--</span>
        </div>
        <div class="result-item full">
          <span class="key">印花税+过户费</span><span class="val" id="taxDetail">--</span>
        </div>
      </div>
      <div class="new-cost">
        <div class="label">操作后新持仓成本</div>
        <div class="value" id="newCost">--</div>
      </div>
    </div>
  </div>
</div>

<!-- Stock Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h3 id="modalTitle">新增持仓</h3>
    <div class="field">
      <label>股票名称</label>
      <input type="text" id="modalName" placeholder="如：云铝股份" maxlength="8">
    </div>
    <div class="field">
      <label>成本价（元）</label>
      <input type="text" inputmode="decimal" id="modalCost" placeholder="10.00">
    </div>
    <div class="field">
      <label>持仓数量（股）</label>

<script>
// ========== DATA ENGINE ==========
const STORAGE_KEY_PORTFOLIO = 'tcalc_portfolio_v2';
const STORAGE_KEY_HISTORY = 'tcalc_history_v2';
const STORAGE_KEY_PREFS = 'tcalc_prefs_v2';

let portfolio = [];       // [{ id, name, costPrice, holdQty, mode, openPrice, tPrice1, tQty, tPrice2 }]
let currentStockIndex = 0;
let currentMode = 'reverse';
let editingStockId = null;

function saveAll() {
  // Save all form values into current stock object
  if (portfolio.length > 0 && currentStockIndex < portfolio.length) {
    const s = portfolio[currentStockIndex];
    s.costPrice = parseFloat(document.getElementById('costPrice').value) || s.costPrice;
    s.holdQty = parseInt(document.getElementById('holdQty').value, 10) || s.holdQty;
    s.mode = currentMode;
    s.openPrice = parseFloat(document.getElementById('openPrice').value) || s.openPrice;
    s.tPrice1 = parseFloat(document.getElementById('tPrice1').value) || s.tPrice1;
    s.tQty = parseInt(document.getElementById('tQty').value, 10) || s.tQty;
    s.tPrice2 = parseFloat(document.getElementById('tPrice2').value) || s.tPrice2;
  }
  localStorage.setItem(STORAGE_KEY_PORTFOLIO, JSON.stringify(portfolio));
  localStorage.setItem(STORAGE_KEY_PREFS, JSON.stringify({
    currentStockIndex: currentStockIndex,
    currentMode: currentMode,
    posFolded: document.getElementById('posFold').classList.contains('hidden'),
  }));
}

function saveDebounced() {
  clearTimeout(window._saveTimeout);
  window._saveTimeout = setTimeout(saveAll, 500);
}

function loadData() {
  const rawP = localStorage.getItem(STORAGE_KEY_PORTFOLIO);
  if (rawP) {
    try { portfolio = JSON.parse(rawP); } catch(e) { portfolio = []; }
  }
  // Ensure every stock has default fields
  portfolio.forEach(s => {
    if (!s.mode) s.mode = 'reverse';
    if (!s.openPrice) s.openPrice = 10;
    if (!s.tPrice1) s.tPrice1 = 10;
    if (!s.tQty) s.tQty = 1000;
    if (!s.tPrice2) s.tPrice2 = 9.9;
  });

  // If no stocks, create default portfolio
  if (portfolio.length === 0) {
    portfolio.push(
      { id: 's1', name: '云铝股份', costPrice: 28.6633, holdQty: 1000, mode: 'reverse', openPrice: 28.6633, tPrice1: 28.66, tQty: 1000, tPrice2: 28.37 },
      { id: 's2', name: '今世缘',   costPrice: 27.1638, holdQty: 500,  mode: 'reverse', openPrice: 27.1638, tPrice1: 27.16, tQty: 500,  tPrice2: 26.88 },

      { id: 's4', name: '中国石油', costPrice: 10.6007, holdQty: 1000, mode: 'reverse', openPrice: 10.6007, tPrice1: 10.60, tQty: 1000, tPrice2: 10.49 },
      { id: 's5', name: '黄河旋风', costPrice: 9.275,  holdQty: 500,  mode: 'reverse', openPrice: 9.275,  tPrice1: 9.28,  tQty: 500,  tPrice2: 9.19 }
    );
  }

  const rawPrefs = localStorage.getItem(STORAGE_KEY_PREFS);
  let prefs = {};
  if (rawPrefs) {
    try { prefs = JSON.parse(rawPrefs); } catch(e) {}
  }
  currentStockIndex = (typeof prefs.currentStockIndex === 'number' && prefs.currentStockIndex < portfolio.length)
    ? prefs.currentStockIndex : 0;
  currentMode = prefs.currentMode || 'reverse';
}

// Update snapshot row
function updateSnapshot() {
  if (portfolio.length === 0 || currentStockIndex >= portfolio.length) {
    document.getElementById('posSnapshot').innerHTML = '<span style="color:var(--text-muted)">暂无持仓</span>';
    return;
  }
  const s = portfolio[currentStockIndex];
  const cost = parseFloat(document.getElementById('costPrice').value) || s.costPrice;
  const qty = parseInt(document.getElementById('holdQty').value, 10) || s.holdQty;
  const name = s.name;
  document.getElementById('posSnapshot').innerHTML =
    '<span class="snap-item">📌 <b>' + escapeHtml(name) + '</b></span>' +
    '<span class="snap-item">成本 <span class="snap-val snap-cost">' + fmtMoney4(cost) + '</span></span>' +
    '<span class="snap-item">持仓 <span class="snap-val">' + qty + '股</span></span>';
}

// Build tab bar
function buildTabBar() {
  const bar = document.getElementById('stockTabBar');
  let html = '';
  portfolio.forEach((s, i) => {
    const activeCls = (i === currentStockIndex) ? ' active' : '';
    html += '<span class="stock-tab' + activeCls + '" onclick="switchStock(' + i + ')" data-idx="' + i + '">'
      + escapeHtml(s.name)
      + '<span class="del-stock" onclick="event.stopPropagation();deleteStockConfirm(' + i + ')">✕</span>'
      + '</span>';
  });
  html += '<button class="add-stock-btn" onclick="openAddModal()" title="新增持仓">+</button>';

}

// Switch stock
function switchStock(idx) {
  if (idx === currentStockIndex) return;
  saveAll();
  currentStockIndex = idx;
  loadStockIntoForm();

  updateSnapshot();

}

// Load stock data into form
function loadStockIntoForm() {
  if (portfolio.length === 0 || currentStockIndex >= portfolio.length) return;
  const s = portfolio[currentStockIndex];
  document.getElementById('costPrice').value = s.costPrice;
  document.getElementById('holdQty').value = s.holdQty;

function openEditModal(idx, name, cost, qty) {

}

function closeModal() {

function saveStock() {
  const name = document.getElementById('modalName').value.trim();
  const cost = parseFloat(document.getElementById('modalCost').value);
  const qty = parseInt(document.getElementById('modalQty').value, 10);

  if (!name) { alert('请输入股票名称'); return; }
  if (isNaN(cost) || cost <= 0) { alert('请输入有效的成本价'); return; }
  if (isNaN(qty) || qty < 100) { alert('持仓数量至少100股'); return; }

  if (editingStockId) {
    // Edit existing
    const idx = portfolio.findIndex(s => s.id === editingStockId);
    if (idx >= 0) {
      portfolio[idx].name = name;
      portfolio[idx].costPrice = cost;
      portfolio[idx].holdQty = qty;
    }
  } else {
    // Add new
    const id = 's' + Date.now();
    portfolio.push({
      id, name,
      costPrice: cost, holdQty: qty,
      mode: 'reverse', openPrice: cost, tPrice1: cost, tQty: Math.min(qty, 10000), tPrice2: cost
    });
    currentStockIndex = portfolio.length - 1;
  }

  buildTabBar();
  loadStockIntoForm();
  updateSnapshot();
  saveAll();
  closeModal();
}

function deleteStockConfirm(idx) {
  if (portfolio.length <= 1) {
    alert('至少保留一只持仓');
    return;
  }
  if (!confirm('确定删除「' + portfolio[idx].name + '」？')) return;
  // Remove from portfolio
  portfolio.splice(idx, 1);
  // Remove its history
  const stockId = portfolio[idx] ? portfolio[idx].id : '';
  if (currentStockIndex >= portfolio.length) currentStockIndex = portfolio.length - 1;
  if (currentStockIndex < 0) currentStockIndex = 0;
  buildTabBar();
  loadStockIntoForm();
  updateSnapshot();
  saveAll();
}

['costPrice','holdQty','openPrice','tPrice1','tQty','tPrice2'].forEach(function(id) {

// ========== Sliding & Spin (same as v4) ==========
let slideState = null;
const SLIDE_PIXEL_STEP = 5;

function sellPriceBounds() {
  const openP = parseFloat(document.getElementById('openPrice').value);
  if (isNaN(openP) || openP <= 0) return { min: 0.01, max: 99999 };
  return { min: Math.round(openP * 0.9 * 100) / 100, max: Math.round(openP * 1.1 * 100) / 100 };
}

function buybackPriceBounds() { return sellPriceBounds(); }
function holdQtyBounds() { return { min: 100, max: 999999 }; }

function tQtyBounds() {
  const min = 100;
  let max = 10000;
  if (currentMode === 'reverse') {
    const holdQty = parseFloat(document.getElementById('holdQty').value) || 0;
    max = Math.min(10000, Math.floor(holdQty / 100) * 100);
    if (max < 100) max = 100;
  }
  return { min, max };
}

function openPriceBounds() { return { min: 0.01, max: 99999 }; }

function slideStart(e, el, getBounds, onChange, step) {
  step = step || 0.01;
  const pos = e.touches ? e.touches[0] : e;
  slideState = {
    inputEl: el, startX: pos.clientX,
    lastVal: parseFloat(el.value) || 0, pixelAccum: 0,
    getBounds: getBounds || function() { return { min: 0.01, max: 99999 }; },
    onChange: onChange || function() {}, step: step, moved: false
  };
  el.style.cursor = 'ew-resize';
  el.classList.add('sliding');
}

function slideMove(e) {
  if (!slideState) return;
  const pos = e.touches ? e.touches[0] : e;
  const dx = pos.clientX - slideState.startX;
  slideState.pixelAccum += dx;
  slideState.startX = pos.clientX;
  const steps = Math.floor(Math.abs(slideState.pixelAccum) / SLIDE_PIXEL_STEP);
  if (steps > 0) {
    e.preventDefault();
    slideState.moved = true;
    const sign = slideState.pixelAccum > 0 ? 1 : -1;
    slideState.pixelAccum -= sign * steps * SLIDE_PIXEL_STEP;
    const s = slideState.step;
    let newVal = Math.round((slideState.lastVal + sign * steps * s) * 100) / 100;
    const b = slideState.getBounds();
    if (newVal < b.min) newVal = b.min;
    if (newVal > b.max) newVal = b.max;
    slideState.lastVal = newVal;
    slideState.inputEl.value = (s >= 1) ? Math.round(newVal).toString() : newVal.toFixed(2);
    slideState.onChange(newVal);
    saveDebounced();
  }
  e.preventDefault();
}

function slideEnd() {
  if (!slideState) return;
  slideState.inputEl.style.cursor = '';
  slideState.inputEl.classList.remove('sliding');
  slideState = null;
}

// ──── Spin buttons ────
let spinTimer = null;
let spinId = null;
let spinDelta = 0;

function spinStart(id, delta) {
  spinStop();
  spinId = id;
  spinDelta = delta;
  applySpin();
  spinTimer = setInterval(applySpin, 120);
}

function spinStop() {
  if (spinTimer) { clearInterval(spinTimer); spinTimer = null; }
  spinId = null;
  spinDelta = 0;
}

function applySpin() {
  if (!spinId) return;
  const el = document.getElementById(spinId);
  let val = parseFloat(el.value) || 0;
  if (spinId === 'tQty' || spinId === 'holdQty') {
    val = Math.round(val + spinDelta);
    const bounds = spinId === 'tQty' ? tQtyBounds() : holdQtyBounds();
    if (val < bounds.min) val = bounds.min;
    if (val > bounds.max) val = bounds.max;
    el.value = Math.round(val).toString();
    saveDebounced();
    updateSnapshot();
    return;
  }
  val = Math.round((val + spinDelta) * 100) / 100;
  if (val < 0) val = 0;
  if (val > 99999) val = 99999;
  el.value = val.toFixed(2);
  if (spinId === 'tPrice1') updateRefPrice();
  if (spinId === 'tPrice2') document.getElementById('tPrice2').dataset.autoSet = 'false';
  saveDebounced();
}

// ──── position qty change ────
function onHoldQtyChange() {
  const el = document.getElementById('holdQty');
  let val = parseInt(el.value, 10);
  if (isNaN(val) || val < 1) { el.value = '100'; val = 100; }
  val = Math.round(val / 100) * 100;
  const bounds = holdQtyBounds();
  if (val < bounds.min) val = bounds.min;
  if (val > bounds.max) val = bounds.max;
  el.value = val.toString();
  const tQty = document.getElementById('tQty');
  const tMax = Math.floor(Math.min(val, 10000) / 100) * 100;
  tQty.value = tMax >= 100 ? tMax.toString() : '100';
  if (currentMode === 'reverse') checkHoldQtySufficient();
  saveDebounced();
  updateSnapshot();
}

function onTQtyChange() {
  const el = document.getElementById('tQty');
  let val = parseInt(el.value, 10);
  if (isNaN(val) || val < 1) { el.value = '100'; val = 100; }
  val = Math.round(val / 100) * 100;
  const bounds = tQtyBounds();
  if (val < bounds.min) val = bounds.min;
  if (val > bounds.max) val = bounds.max;
  el.value = val.toString();
  if (currentMode === 'reverse') checkHoldQtySufficient();
  saveDebounced();
}

function checkHoldQtySufficient() {
  const el = document.getElementById('tQty');
  const holdQty = parseFloat(document.getElementById('holdQty').value) || 0;
  const spinBtns = el.parentElement.querySelectorAll('.spin-btn');
  if (holdQty < 100) {
    el.value = '';
    el.placeholder = '底仓不足，无法操作';
    el.disabled = true;
    spinBtns.forEach(b => b.disabled = true);
  } else {
    el.disabled = false;
    el.placeholder = '1000';
    spinBtns.forEach(b => b.disabled = false);
  }
}

function onSlideOpenPrice(newVal) { syncPricesFromOpen(); saveDebounced(); }

function applyRatio(ratio) {

function updateRefPrice() {

      t2.value = (t1 * ratio).toFixed(2);
      t2.dataset.autoSet = 'true';

}

// ──── Calculation ────
function parseNum(id) {
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) ? 0 : v;
}

function calcFee(amount, isSell) {
  let commRate = 0.01854 / 100;
  let comm = amount * commRate;
  let minComm = 5;
  if (comm > 0 && comm < minComm) comm = minComm;
  let stampRate = 0.05 / 100;
  let stamp = isSell ? amount * stampRate : 0;
  let transRate = 0.001 / 100;
  let trans = amount * transRate;
  return { comm, stamp, trans, total: comm + stamp + trans };
}

function fmtMoney(v) {
  if (Math.abs(v) < 0.005) return '0.00';
  return v.toFixed(2);
}

function fmtMoney4(v) {
  if (Math.abs(v) < 0.00005) return '0.0000';
  return v.toFixed(4);
}

function calculate() {
  const tPrice1 = parseNum('tPrice1');
  const tQty = parseNum('tQty');
  const tPrice2 = parseNum('tPrice2');

  if (!tPrice1 || !tQty || !tPrice2) {
    alert('请填写卖出/买入价、操作数量和预期价');
    return;
  }

  const costPrice = parseNum('costPrice');
  const holdQty = parseNum('holdQty');
  let amount1, amount2, fee1, fee2, netOp1, netOp2, diff;

  if (currentMode === 'reverse') {
    amount1 = tPrice1 * tQty;
    fee1 = calcFee(amount1, true);
    amount2 = tPrice2 * tQty;
    fee2 = calcFee(amount2, false);
    netOp1 = amount1 - fee1.total;
    netOp2 = amount2 + fee2.total;
    diff = netOp1 - netOp2;
    document.getElementById('op1Val').textContent = '+' + fmtMoney(netOp1);
    document.getElementById('op2Val').textContent = '-' + fmtMoney(netOp2);
  } else {
    amount1 = tPrice1 * tQty;
    fee1 = calcFee(amount1, false);
    amount2 = tPrice2 * tQty;
    fee2 = calcFee(amount2, true);
    netOp1 = amount1 + fee1.total;
    netOp2 = amount2 - fee2.total;
    diff = netOp2 - netOp1;
    document.getElementById('op1Val').textContent = '-' + fmtMoney(netOp1);
    document.getElementById('op2Val').textContent = '+' + fmtMoney(netOp2);
  }

  document.getElementById('diffVal').textContent = fmtMoney(diff);

  const feeTotal = fee1.total + fee2.total;
  document.getElementById('feeTotal').textContent = fmtMoney(feeTotal);

  const commTotal = fee1.comm + fee2.comm;
  document.getElementById('commDetail').textContent =
    '佣金 ' + fmtMoney(commTotal) + '（买' + fmtMoney(fee1.comm) + ' + 卖' + fmtMoney(fee2.comm) + '）';
  document.getElementById('taxDetail').textContent =
    '印花税 ' + fmtMoney(fee1.stamp + fee2.stamp) + ' + 过户费 ' + fmtMoney(fee1.trans + fee2.trans);

  const bigEl = document.getElementById('resultBig');
  if (diff >= 0) {
    bigEl.textContent = '+' + fmtMoney(diff) + ' 元';
    bigEl.className = 'value profit';
  } else {
    bigEl.textContent = fmtMoney(diff) + ' 元';
    bigEl.className = 'value loss';
  }

  const investCapital = (amount1 + fee1.total);
  const pctEl = document.getElementById('resultPct');
  if (investCapital > 0) {
    const pct = (diff / investCapital * 100);
    const sign = pct >= 0 ? '+' : '';
    pctEl.textContent = sign + pct.toFixed(2) + '%';
    pctEl.style.color = diff >= 0 ? 'var(--profit)' : 'var(--loss)';
  } else {
    pctEl.textContent = '--';
  }

  if (costPrice && holdQty) {
    const totalCostBefore = costPrice * holdQty;
    const totalCostAfter = totalCostBefore - diff;
    const newCostPrice = totalCostAfter / holdQty;
    document.getElementById('newCost').textContent = fmtMoney4(newCostPrice) + ' 元';
    document.getElementById('newCost').style.display = '';
    document.querySelector('.new-cost .label').style.display = '';
  } else {
    document.getElementById('newCost').textContent = '';
    document.getElementById('newCost').style.display = 'none';
    document.querySelector('.new-cost .label').style.display = 'none';
  }

  // Show result + scroll
  const resultCard = document.getElementById('resultCard');
  resultCard.classList.add('show');
  document.getElementById('copyBtn').classList.remove('copied');
  document.getElementById('copyBtn').textContent = '复制';
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Save result to history (预留，第二期激活)
  saveHistoryEntry({
    mode: currentMode, stockName: portfolio[currentStockIndex] ? portfolio[currentStockIndex].name : '',
    tPrice1, tQty, tPrice2, diff, feeTotal,
    timestamp: new Date().toISOString()
  });
  saveAll();
}

// ──── History (reserved for phase 2) ────
function saveHistoryEntry(entry) {
  // Phase 2 will render these; for now just store
  const raw = localStorage.getItem(STORAGE_KEY_HISTORY);
  let history = [];
  if (raw) { try { history = JSON.parse(raw); } catch(e) {} }
  history.unshift(entry);
  if (history.length > 100) history = history.slice(0, 100);
  localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(history));
}

// ──── Copy ────
function copyResult() {
  const lines = [];
  const stockName = portfolio[currentStockIndex] ? portfolio[currentStockIndex].name : '';
  lines.push('=== 做T预估结果 ===');
  lines.push('股票：' + stockName);
  lines.push('模式：' + (currentMode === 'reverse' ? '倒T（高抛低吸）' : '正T（先买后卖）'));
  lines.push(document.getElementById('op1Label').textContent + '：' + document.getElementById('op1Val').textContent);
  lines.push(document.getElementById('op2Label').textContent + '：' + document.getElementById('op2Val').textContent);
  lines.push('差价：' + document.getElementById('diffVal').textContent + ' 元');
  lines.push('手续费合计：' + document.getElementById('feeTotal').textContent + ' 元');
  lines.push('净盈亏：' + document.getElementById('resultBig').textContent);
  lines.push('盈亏率：' + document.getElementById('resultPct').textContent);
  lines.push('新持仓成本：' + document.getElementById('newCost').textContent);

  const text = lines.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '已复制 ✓';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ──── Spin buttons global listeners ────
document.addEventListener('pointerdown', function(e) {
  const btn = e.target.closest('.spin-btn');
  if (!btn) return;
  const id = btn.dataset.spinId;
  const delta = parseFloat(btn.dataset.spinDelta);
  if (id && !isNaN(delta)) {
    e.preventDefault();
    spinStart(id, delta);
    btn.setPointerCapture(e.pointerId);
  }
});
document.addEventListener('pointerup', function(e) { spinStop(); });
document.addEventListener('pointercancel', function(e) { spinStop(); });

// ──── Slide global listeners ────
document.addEventListener('touchmove', function(e) {
  if (slideState) slideMove(e);
}, { passive: false });
document.addEventListener('touchend', function(e) { slideEnd(); });
document.addEventListener('mousemove', function(e) { if (slideState) slideMove(e); });
document.addEventListener('mouseup', function(e) { slideEnd(); });

// ──── Keyboard shortcuts ────
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'Enter') { e.preventDefault(); calculate(); }
  if (e.key === 'b' || e.key === 'B') { setMode('normal'); }
  if (e.key === 's' || e.key === 'S') { setMode('reverse'); }
});

// ──── Init ────
loadData();
buildTabBar();
loadStockIntoForm();
updateSnapshot();

// Apply saved fold state
const rawPrefs = localStorage.getItem(STORAGE_KEY_PREFS);
if (rawPrefs) {
  try {
    const prefs = JSON.parse(rawPrefs);
    if (prefs.posFolded) {
      document.getElementById('posFold').classList.add('hidden');
      document.getElementById('posArrow').classList.remove('open');
    }
  } catch(e) {}
}
</script>
