<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C57B7B"/>
      <stop offset="100%" stop-color="#D4918F"/>
    </linearGradient>
    <linearGradient id="sg" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#D9B0A0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C57B7B" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Subtle grid behind heart -->
  <g stroke="#D5CCC8" stroke-width="0.4" stroke-dasharray="4 6" opacity="0.35">
    <line x1="160" y1="10" x2="160" y2="190"/>
    <line x1="80" y1="100" x2="240" y2="100"/>
    <line x1="100" y1="30" x2="100" y2="170"/>
    <line x1="220" y1="30" x2="220" y2="170"/>
    <line x1="120" y1="50" x2="120" y2="160"/>
    <line x1="200" y1="50" x2="200" y2="160"/>
    <line x1="70" y1="70" x2="250" y2="70"/>
    <line x1="70" y1="130" x2="250" y2="130"/>
  </g>
  <!-- Heart curve -->
  <path d="M160,168 C156,156 108,122 84,92 C60,62 62,30 88,26 C114,22 138,44 160,72 C182,44 206,22 232,26 C258,30 260,62 236,92 C212,122 164,156 160,168Z" fill="url(#hg)" stroke="#B86A6A" stroke-width="0.8"/>
  <!-- Highlight on upper-left -->
  <ellipse cx="118" cy="58" rx="18" ry="22" fill="url(#sg)" transform="rotate(-15 118 58)"/>
  <!-- Shadow -->
  <ellipse cx="160" cy="180" rx="52" ry="6" fill="#B8A090" opacity="0.2"/>
</svg>
