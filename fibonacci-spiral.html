<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>青竹数苑 · 斐波那契螺旋线</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bamboo:#5B8C5A;--bamboo-dark:#2D4A32;--bamboo-mist:#F0F5EE;
  --bamboo-light:#D6E5D2;--wood-gold:#C5A96A;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bamboo-mist);
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
body{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* top bar */
.top-bar{
  height:48px;background:rgba(240,245,238,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(91,140,90,.10);
  display:flex;align-items:center;padding:0 16px;flex-shrink:0;z-index:30;gap:10px;
}
.top-bar a{color:var(--bamboo-dark);text-decoration:none;font-size:14px;
  display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:background .2s}
.top-bar a:hover{background:rgba(91,140,90,.08)}
.page-title{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;
  color:var(--bamboo-dark);white-space:nowrap;margin-left:4px}

/* canvas */
.canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
canvas{display:block;width:100%;height:100%;touch-action:none}

/* info overlay */
.info{
  position:absolute;top:12px;left:16px;
  background:rgba(240,245,238,.88);backdrop-filter:blur(8px);
  border:1px solid rgba(91,140,90,.12);border-radius:10px;
  padding:10px 14px;font-size:13px;color:var(--bamboo-dark);
  pointer-events:none;line-height:1.7;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.info .fn{font-weight:700;color:var(--wood-gold);font-size:15px}
.info .phi{color:var(--bamboo);font-weight:600}

/* control bar */
.ctrl{
  flex-shrink:0;background:rgba(240,245,238,.95);backdrop-filter:blur(12px);
  border-top:1px solid rgba(91,140,90,.10);
  padding:10px 20px 14px;display:flex;flex-direction:column;gap:10px;
}
.ctrl-row{display:flex;align-items:center;gap:10px}
.ctrl-row label{font-size:13px;color:var(--bamboo-dark);white-space:nowrap;min-width:55px}
.ctrl-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;
  height:5px;border-radius:3px;outline:none;background:var(--bamboo-light)}
.ctrl-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--bamboo);cursor:pointer;border:2.5px solid #fff;
  box-shadow:0 1px 4px rgba(0,0,0,.15)}
.ctrl-val{font-size:13px;font-weight:600;color:var(--bamboo-dark);min-width:24px;text-align:right}
.btn-row{display:flex;gap:8px;justify-content:center}
.btn{padding:7px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-play{background:var(--bamboo);color:#fff}
.btn-play:hover{background:var(--bamboo-dark)}
.btn-reset{background:transparent;color:var(--bamboo-dark);border:1.5px solid var(--bamboo-light)}
.btn-reset:hover{border-color:var(--bamboo)}

.hint{text-align:center;font-size:11px;color:rgba(91,140,90,.5);letter-spacing:1px}

@media(max-width:480px){
  .ctrl{padding:8px 14px 12px;gap:8px}
  .ctrl-row label{min-width:48px;font-size:12px}
  .btn{padding:6px 16px;font-size:12px}
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html">← 返回</a>
  <span class="page-title">斐波那契螺旋线</span>
</div>

<div class="canvas-wrap">
  <div class="info" id="info">
    <div class="fn" id="fnDisp">F₁ = 1</div>
    <div id="ratioDisp">—</div>
    <div class="phi" id="phiDisp">φ ≈ 1.618034</div>
  </div>
  <canvas id="c"></canvas>
</div>

<div class="ctrl">
  <div class="ctrl-row">
    <label>数量</label>
    <input type="range" id="sldCount" min="4" max="12" value="8" step="1">
    <span class="ctrl-val" id="valCount">8</span>
  </div>
  <div class="ctrl-row">
    <label>速度</label>
    <input type="range" id="sldSpeed" min="1" max="10" value="5" step="1">
    <span class="ctrl-val" id="valSpeed">5</span>
  </div>
  <div class="btn-row">
    <button class="btn btn-play" id="btnPlay">⏸ 暂停</button>
    <button class="btn btn-reset" id="btnReset">↻ 重置</button>
  </div>
  <div class="hint">拖拽旋转 · 双指缩放</div>
</div>

<script>
(function(){
"use strict";

/* ── Morandi palette ── */
const MORANDI = [
  '#C9B8A8','#B8C5B2','#C2A8A0','#A8B8C2',
  '#C5BBA8','#B2C2B8','#C2B2A8','#A8C2B8',
  '#BBA8C2','#C2C2A8','#A8A8C2','#C2A8B2'
];

/* ── State ── */
let count = 8;
let speed = 5;
let progress = 0;       // 0 to 1, continuous smooth progress
let playing = true;
let rafId = null;
let lastTime = 0;
let fibs = [];
let rects = [];         // {x,y,w,h,fib,idx}
let spiralPts = [];     // pre-computed spiral points for smooth drawing
let canvas, ctx;

/* ── Fibonacci ── */
function genFibs(n){
  const f = [1,1];
  for(let i=2;i<n;i++) f.push(f[i-1]+f[i-2]);
  return f;
}

/* ── Build layout (golden rectangles) ── */
function buildLayout(fibSeq){
  const rs = [];
  rs.push({x:0,y:0,w:1,h:1,fib:fibSeq[0],idx:0});
  if(fibSeq.length===1) return rs;
  rs.push({x:1,y:0,w:1,h:1,fib:fibSeq[1],idx:1});

  let rx=0,ry=0,rw=2,rh=1;
  let dir=0;
  for(let i=2;i<fibSeq.length;i++){
    const s = fibSeq[i-1];
    let sx,sy;
    switch(dir){
      case 0: sx=rx; sy=ry+rh; rh+=s; break;
      case 1: sx=rx-s; sy=ry; rx=sx; rw+=s; break;
      case 2: sx=rx; sy=ry-s; ry=sy; rh+=s; break;
      case 3: sx=rx+rw; sy=ry; rw+=s; break;
    }
    rs.push({x:sx,y:sy,w:s,h:s,fib:fibSeq[i],idx:i});
    dir=(dir+1)%4;
  }
  return rs;
}

/* ── Compute spiral points (logarithmic golden spiral) ── */
function computeSpiral(layout, cw, ch){
  // Find bounding box
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const r of layout){
    minX=Math.min(minX,r.x); minY=Math.min(minY,r.y);
    maxX=Math.max(maxX,r.x+r.w); maxY=Math.max(maxY,r.y+r.h);
  }
  const lw=maxX-minX, lh=maxY-minY;
  const pad=50;
  const sx=(cw-pad*2)/lw, sy=(ch-pad*2)/lh;
  const sc=Math.min(sx,sy);
  const ox=(cw-lw*sc)/2-minX*sc;
  const oy=(ch-lh*sc)/2-minY*sc;

  // Scale rects
  const sr = layout.map(r=>({
    ...r,
    sx: r.x*sc+ox, sy: r.y*sc+oy,
    ss: r.w*sc
  }));

  // Build golden spiral as continuous logarithmic spiral
  // φ = golden ratio, spiral: r = a·φ^(θ/(π/2))
  const PHI = (1+Math.sqrt(5))/2;
  const totalAngle = count * Math.PI/2; // each square = quarter turn
  const numPts = 2000;

  // Compute spiral center (approximate: center of all rects)
  let cx=0, cy=0;
  for(const r of sr){ cx+=r.sx+r.ss/2; cy+=r.sy+r.ss/2; }
  cx/=sr.length; cy/=sr.length;

  // Better: use the innermost square's corner as spiral center
  // The spiral origin is at the intersection of the first two squares
  const s0 = sr[0], s1 = sr[1];
  const spiralCx = s0.sx + s0.ss;
  const spiralCy = s0.sy + s0.ss;

  // Compute points using golden spiral formula
  // Scale: at θ=0, r = baseR; at θ=totalAngle, r = maxR
  // r(θ) = baseR * φ^(2θ/π)
  const baseR = sr[0].ss * 0.618; // start radius
  const pts = [];
  for(let i=0;i<=numPts;i++){
    const t = i/numPts;
    const theta = t * totalAngle;
    const r = baseR * Math.pow(PHI, 2*theta/Math.PI);
    // Spiral goes counterclockwise from right
    const x = spiralCx + r * Math.cos(theta);
    const y = spiralCy - r * Math.sin(theta);
    pts.push({x,y,t});
  }

  return {rects:sr, points:pts, cx:spiralCx, cy:spiralCy};
}

/* ── Draw ── */
function draw(prog){
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;
  if(canvas.width!==cw*dpr||canvas.height!==ch*dpr){
    canvas.width=cw*dpr; canvas.height=ch*dpr;
  }
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,cw,ch);

  if(!rects.length) return;

  const layout = buildLayout(fibs);
  const sp = computeSpiral(layout, cw, ch);
  const sr = sp.rects;
  const pts = sp.points;

  // How many points to draw based on progress
  const drawCount = Math.floor(prog * pts.length);

  // Draw rectangles (subtle background)
  // Show only rectangles that the spiral has passed through
  const anglePerRect = Math.PI/2;
  const totalAngle = count * Math.PI/2;
  const currentAngle = prog * totalAngle;

  for(let i=0;i<sr.length;i++){
    const rectAngle = (i+1)*anglePerRect;
    if(currentAngle < (i)*anglePerRect) break; // not reached yet

    const r = sr[i];
    // Fade in effect
    const fadeIn = Math.min(1, (currentAngle - i*anglePerRect)/anglePerRect);

    ctx.fillStyle = MORANDI[i%MORANDI.length];
    ctx.globalAlpha = 0.15 + 0.2*fadeIn;
    ctx.fillRect(r.sx, r.sy, r.ss, r.ss);
    ctx.globalAlpha = 1;

    // Border
    ctx.strokeStyle = 'rgba(45,74,50,0.18)';
    ctx.lineWidth = 1;
    ctx.strokeRect(r.sx, r.sy, r.ss, r.ss);

    // Fibonacci number label
    if(r.ss > 30){
      const fs = Math.min(r.ss*0.28, 22);
      ctx.font = `600 ${fs}px -apple-system,"PingFang SC",sans-serif`;
      ctx.fillStyle = 'rgba(45,74,50,0.4)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(r.fib, r.sx+r.ss/2, r.sy+r.ss/2);
    }
  }

  // Draw the golden spiral (smooth, continuous)
  if(drawCount > 1){
    // Glow layer
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<drawCount;i++){
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.strokeStyle = 'rgba(197,169,106,0.25)';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Main spiral line
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<drawCount;i++){
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.strokeStyle = '#C5A96A';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Leading dot
    if(drawCount > 0){
      const p = pts[drawCount-1];
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
      ctx.fillStyle = '#C5A96A';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(197,169,106,0.4)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // Update info
  const fi = Math.min(Math.floor(currentAngle/anglePerRect), fibs.length-1);
  document.getElementById('fnDisp').textContent = `F${fi+1} = ${fibs[fi]}`;
  if(fi>0){
    const ratio = (fibs[fi]/fibs[fi-1]).toFixed(6);
    document.getElementById('ratioDisp').textContent = `F${fi+1}/F${fi} = ${ratio}`;
  } else {
    document.getElementById('ratioDisp').textContent = '—';
  }
}

/* ── Animation ── */
function animate(ts){
  if(!playing) return;
  if(!lastTime) lastTime=ts;

  const dt = (ts-lastTime)/1000;
  lastTime = ts;

  const spd = 0.08 + speed*0.06; // progress per second
  progress += dt * spd;

  if(progress >= 1){
    progress = 1;
    playing = false;
    updateBtn();
  }

  draw(progress);

  if(playing) rafId = requestAnimationFrame(animate);
}

function updateBtn(){
  document.getElementById('btnPlay').textContent = playing ? '⏸ 暂停' : '▶ 播放';
}

/* ── Rebuild ── */
function rebuild(){
  fibs = genFibs(count);
  rects = buildLayout(fibs);
  progress = 0;
  playing = false;
  if(rafId) cancelAnimationFrame(rafId);
  lastTime = 0;
  draw(0);
  updateBtn();
}

/* ── Init ── */
function init(){
  canvas = document.getElementById('c');
  ctx = canvas.getContext('2d');

  document.getElementById('sldCount').addEventListener('input', e=>{
    count = +e.target.value;
    document.getElementById('valCount').textContent = count;
    rebuild();
  });

  document.getElementById('sldSpeed').addEventListener('input', e=>{
    speed = +e.target.value;
    document.getElementById('valSpeed').textContent = speed;
  });

  document.getElementById('btnPlay').addEventListener('click', ()=>{
    if(playing){
      playing = false;
    } else {
      if(progress >= 1){ progress = 0; }
      playing = true;
      lastTime = 0;
      rafId = requestAnimationFrame(animate);
    }
    updateBtn();
  });

  document.getElementById('btnReset').addEventListener('click', rebuild);

  let rt;
  window.addEventListener('resize', ()=>{
    clearTimeout(rt);
    rt = setTimeout(()=>{ draw(progress); }, 100);
  });

  rebuild();
  // Auto-play
  playing = true;
  lastTime = 0;
  updateBtn();
  rafId = requestAnimationFrame(animate);
}

document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
