<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>青竹数苑 · 斐波那契螺旋线</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bamboo:#5B8C5A;--bamboo-dark:#2D4A32;--bamboo-mist:#F0F5EE;--bamboo-light:#D6E5D2;--gold:#C5A96A}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bamboo-mist);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
body{display:flex;flex-direction:column;height:100vh;height:100dvh}

.top-bar{height:48px;background:rgba(240,245,238,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(91,140,90,.10);display:flex;align-items:center;padding:0 16px;flex-shrink:0;z-index:30;gap:10px}
.top-bar a{color:var(--bamboo-dark);text-decoration:none;font-size:14px;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:background .2s}
.top-bar a:hover{background:rgba(91,140,90,.08)}
.page-title{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;color:var(--bamboo-dark);white-space:nowrap;margin-left:4px}

.canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
canvas{display:block;width:100%;height:100%;touch-action:none}

.info{position:absolute;top:12px;left:16px;background:rgba(240,245,238,.88);backdrop-filter:blur(8px);border:1px solid rgba(91,140,90,.12);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--bamboo-dark);pointer-events:none;line-height:1.7;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.info .fn{font-weight:700;color:var(--gold);font-size:15px}
.info .phi{color:var(--bamboo);font-weight:600}

.ctrl{flex-shrink:0;background:rgba(240,245,238,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(91,140,90,.10);padding:10px 20px 14px;display:flex;flex-direction:column;gap:10px}
.ctrl-row{display:flex;align-items:center;gap:10px}
.ctrl-row label{font-size:13px;color:var(--bamboo-dark);white-space:nowrap;min-width:55px}
.ctrl-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;outline:none;background:var(--bamboo-light)}
.ctrl-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--bamboo);cursor:pointer;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.ctrl-val{font-size:13px;font-weight:600;color:var(--bamboo-dark);min-width:24px;text-align:right}
.btn-row{display:flex;gap:8px;justify-content:center}
.btn{padding:7px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-play{background:var(--bamboo);color:#fff}.btn-play:hover{background:var(--bamboo-dark)}
.btn-reset{background:transparent;color:var(--bamboo-dark);border:1.5px solid var(--bamboo-light)}.btn-reset:hover{border-color:var(--bamboo)}
.hint{text-align:center;font-size:11px;color:rgba(91,140,90,.5);letter-spacing:1px}
@media(max-width:480px){.ctrl{padding:8px 14px 12px;gap:8px}.ctrl-row label{min-width:48px;font-size:12px}.btn{padding:6px 16px;font-size:12px}}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html">← 返回</a>
  <span class="page-title">斐波那契螺旋线</span>
</div>

<div class="canvas-wrap">
  <div class="info" id="info">
    <div class="fn" id="fnDisp">F₁ = 1</div>
    <div id="ratioDisp">—</div>
    <div class="phi" id="phiDisp">φ ≈ 1.618034</div>
  </div>
  <canvas id="c"></canvas>
</div>

<div class="ctrl">
  <div class="ctrl-row">
    <label>数量</label>
    <input type="range" id="sldCount" min="4" max="12" value="8" step="1">
    <span class="ctrl-val" id="valCount">8</span>
  </div>
  <div class="ctrl-row">
    <label>速度</label>
    <input type="range" id="sldSpeed" min="1" max="10" value="5" step="1">
    <span class="ctrl-val" id="valSpeed">5</span>
  </div>
  <div class="btn-row">
    <button class="btn btn-play" id="btnPlay">⏸ 暂停</button>
    <button class="btn btn-reset" id="btnReset">↻ 重置</button>
  </div>
  <div class="hint">拖拽旋转 · 双指缩放</div>
</div>

<script>
(function(){
"use strict";

/* ── Morandi palette ── */
const MORANDI = [
  '#C9B8A8','#B8C5B2','#C2A8A0','#A8B8C2',
  '#C5BBA8','#B2C2B8','#C2B2A8','#A8C2B8',
  '#BBA8C2','#C2C2A8','#A8A8C2','#C2A8B2'
];

const PHI = (1 + Math.sqrt(5)) / 2;
const B_COEFF = Math.log(PHI) / (Math.PI / 2); // ≈ 0.30635

let count = 8, speed = 5, progress = 0, playing = true, rafId = null, lastTime = 0;
let fibs = [], canvas, ctx;

function genFibs(n){
  const f = [1, 1];
  for(let i = 2; i < n; i++) f.push(f[i-1] + f[i-2]);
  return f;
}

/* ── Build Fibonacci tiling layout ──
   Direction cycle (counterclockwise): right → up → left → down
   Each new square extends the bounding box in the current direction. */
function buildLayout(fibSeq){
  const n = fibSeq.length;
  const rs = [{x:0, y:0, w:fibSeq[0], h:fibSeq[0], idx:0}];
  if(n === 1) return rs;

  rs.push({x:fibSeq[0], y:0, w:fibSeq[1], h:fibSeq[1], idx:1});
  if(n === 2) return rs;

  let bx = 0, by = 0;
  let bw = fibSeq[0] + fibSeq[1];
  let bh = Math.max(fibSeq[0], fibSeq[1]);
  let dir = 0; // 0=right, 1=up, 2=left, 3=down

  for(let i = 2; i < n; i++){
    const s = fibSeq[i];
    let sx, sy;
    switch(dir){
      case 0: // place right, align bottom
        sx = bx + bw;
        sy = by + bh - s;
        bw += s;
        break;
      case 1: // place above, align right
        sx = bx + bw - s;
        sy = by - s;
        by = sy;
        bh += s;
        break;
      case 2: // place left, align top
        sx = bx - s;
        sy = by;
        bx = sx;
        bw += s;
        break;
      case 3: // place below, align left
        sx = bx;
        sy = by + bh;
        bh += s;
        break;
    }
    rs.push({x: sx, y: sy, w: s, h: s, idx: i});
    dir = (dir + 1) % 4;
  }
  return rs;
}

/* ── Compute spiral center (convergence point) ── */
function getSpiralCenter(layout){
  const s0 = layout[0], s1 = layout[1];
  // The Fibonacci tiling converges to this fixed point
  const cx = s1.x + s1.w / (1 + PHI) * (1 / PHI);
  const cy = s0.y + s0.h * PHI / (1 + PHI);
  return {cx, cy};
}

/* ── Get corner points that the spiral passes through ──
   Each square contributes one corner based on position in the cycle:
     dir 0 (right): top-right corner
     dir 1 (up):    top-left corner
     dir 2 (left):  bottom-left corner
     dir 3 (down):  bottom-right corner */
function getCorners(layout){
  const corners = [];
  for(let i = 0; i < layout.length; i++){
    const s = layout[i];
    const dir = i % 4;
    let cx, cy;
    switch(dir){
      case 0: cx = s.x + s.w; cy = s.y;       break; // top-right
      case 1: cx = s.x;       cy = s.y;       break; // top-left
      case 2: cx = s.x;       cy = s.y + s.h; break; // bottom-left
      case 3: cx = s.x + s.w; cy = s.y + s.h; break; // bottom-right
    }
    corners.push({x: cx, y: cy});
  }
  return corners;
}

/* ── Draw ── */
function draw(prog){
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;
  if(canvas.width !== cw*dpr || canvas.height !== ch*dpr){
    canvas.width = cw*dpr;
    canvas.height = ch*dpr;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cw, ch);

  const layout = buildLayout(fibs);
  if(!layout.length) return;

  // Bounding box of all squares
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for(const r of layout){
    minX = Math.min(minX, r.x);
    minY = Math.min(minY, r.y);
    maxX = Math.max(maxX, r.x + r.w);
    maxY = Math.max(maxY, r.y + r.h);
  }

  // Scale and center
  const axisPad = 50;
  const lw = maxX - minX, lh = maxY - minY;
  const pad = 30;
  const scX = (cw - pad*2 - axisPad) / lw;
  const scY = (ch - pad*2 - axisPad) / lh;
  const sc = Math.min(scX, scY);
  const ox = (cw - lw*sc) / 2 - minX*sc + axisPad/2;
  const oy = (ch - lh*sc) / 2 - minY*sc - axisPad/2;

  // Draw coordinate axes
  drawAxes(cw, ch, ox, oy, sc, minX, minY, maxX, maxY);

  // Draw Fibonacci squares
  const totalSquares = layout.length;
  const currentSquare = prog * totalSquares;

  for(let i = 0; i < totalSquares; i++){
    const r = layout[i];
    const sx = r.x*sc + ox, sy = r.y*sc + oy, ss = r.w*sc;
    const fadeIn = Math.min(1, Math.max(0, currentSquare - i + 1));
    if(fadeIn <= 0) continue;

    ctx.globalAlpha = 0.10 + 0.15 * fadeIn;
    ctx.fillStyle = MORANDI[i % MORANDI.length];
    ctx.fillRect(sx, sy, ss, ss);
    ctx.globalAlpha = 1;

    ctx.strokeStyle = 'rgba(45,74,50,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, ss, ss);

    if(ss > 30){
      const fs = Math.min(ss * 0.25, 20);
      ctx.font = `600 ${fs}px -apple-system,"PingFang SC",sans-serif`;
      ctx.fillStyle = 'rgba(45,74,50,0.3)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(fibs[i], sx + ss/2, sy + ss/2);
    }
  }

  // ── Draw logarithmic spiral ──
  if(prog > 0){
    // Compute spiral parameters in canvas coords
    const center = getSpiralCenter(layout);
    const scx = center.cx * sc + ox;
    const scy = center.cy * sc + oy;

    const corners = getCorners(layout);
    // r0 and theta0 from first corner
    const c0 = corners[0];
    const dx0 = c0.x - center.cx;
    const dy0 = -(c0.y - center.cy); // flip y for math coords
    const r0 = Math.sqrt(dx0*dx0 + dy0*dy0) * sc;
    const theta0 = Math.atan2(dy0, dx0);

    // theta_max from last corner
    const cLast = corners[corners.length - 1];
    const dxL = cLast.x - center.cx;
    const dyL = -(cLast.y - center.cy);
    const thetaMax = Math.atan2(dyL, dxL);
    // Ensure we sweep enough angle
    let totalAngle = thetaMax - theta0;
    if(totalAngle < 0) totalAngle += 2 * Math.PI;
    // Ensure at least 2 full turns for visual appeal
    while(totalAngle < 4 * Math.PI) totalAngle += 2 * Math.PI;

    const currentTheta = theta0 + prog * totalAngle;
    const step = Math.PI / 180; // 1 degree per step

    // Glow layer
    drawSpiralPath(scx, scy, r0, theta0, currentTheta, step);
    ctx.strokeStyle = 'rgba(197,169,106,0.25)';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Main spiral
    drawSpiralPath(scx, scy, r0, theta0, currentTheta, step);
    ctx.strokeStyle = '#C5A96A';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Leading dot
    const rDot = r0 * Math.exp(B_COEFF * (currentTheta - theta0));
    const dotX = scx + rDot * Math.cos(currentTheta);
    const dotY = scy - rDot * Math.sin(currentTheta);
    ctx.beginPath();
    ctx.arc(dotX, dotY, 5, 0, Math.PI*2);
    ctx.fillStyle = '#C5A96A';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(dotX, dotY, 8, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(197,169,106,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Update info
  const fi = Math.min(Math.floor(currentSquare), fibs.length-1);
  document.getElementById('fnDisp').textContent = `F${fi+1} = ${fibs[fi]}`;
  if(fi > 0){
    const ratio = (fibs[fi] / fibs[fi-1]).toFixed(6);
    document.getElementById('ratioDisp').textContent = `F${fi+1}/F${fi} = ${ratio}`;
  } else {
    document.getElementById('ratioDisp').textContent = '—';
  }
}

/* ── Draw logarithmic spiral path ── */
function drawSpiralPath(cx, cy, r0, thetaStart, thetaEnd, step){
  ctx.beginPath();
  let started = false;
  for(let theta = thetaStart; theta <= thetaEnd; theta += step){
    const r = r0 * Math.exp(B_COEFF * (theta - thetaStart));
    const px = cx + r * Math.cos(theta);
    const py = cy - r * Math.sin(theta); // flip y for screen coords
    if(!started){ ctx.moveTo(px, py); started = true; }
    else ctx.lineTo(px, py);
  }
}

/* ── Draw coordinate axes ── */
function drawAxes(cw, ch, ox, oy, sc, minX, minY, maxX, maxY){
  const axisColor = 'rgba(45,74,50,0.35)';
  const tickColor = 'rgba(45,74,50,0.25)';

  // Axis lines at origin (x=0, y=0 in math coords → screen y=oy)
  const axisY = oy; // horizontal axis (x-axis)
  const axisX = ox; // vertical axis (y-axis)

  ctx.strokeStyle = axisColor;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(Math.max(0, axisX - 20), axisY);
  ctx.lineTo(cw - 10, axisY);
  ctx.moveTo(axisX, Math.min(ch, axisY + 20));
  ctx.lineTo(axisX, 10);
  ctx.stroke();

  // Arrow heads
  ctx.fillStyle = axisColor;
  ctx.beginPath();
  ctx.moveTo(cw - 10, axisY);
  ctx.lineTo(cw - 18, axisY - 4);
  ctx.lineTo(cw - 18, axisY + 4);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(axisX, 10);
  ctx.lineTo(axisX - 4, 18);
  ctx.lineTo(axisX + 4, 18);
  ctx.fill();

  // Tick marks
  const tickStep = getTickStep(sc);
  ctx.font = '10px -apple-system,sans-serif';
  ctx.fillStyle = tickColor;

  // X ticks
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const xStart = Math.ceil(minX / tickStep) * tickStep;
  for(let x = xStart; x <= maxX; x += tickStep){
    if(Math.abs(x) < 0.001) continue;
    const sx = x * sc + ox;
    if(sx < axisX || sx > cw - 5) continue;
    ctx.beginPath();
    ctx.moveTo(sx, axisY - 3);
    ctx.lineTo(sx, axisY + 3);
    ctx.strokeStyle = tickColor;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillText(x, sx, axisY + 6);
  }

  // Y ticks
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  const yStart = Math.ceil(minY / tickStep) * tickStep;
  for(let y = yStart; y <= maxY; y += tickStep){
    if(Math.abs(y) < 0.001) continue;
    const sy = y * sc + oy;
    if(sy < 5 || sy > axisY) continue;
    ctx.beginPath();
    ctx.moveTo(axisX - 3, sy);
    ctx.lineTo(axisX + 3, sy);
    ctx.strokeStyle = tickColor;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillText(-y, axisX - 6, sy);
  }

  // Origin
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillStyle = tickColor;
  ctx.fillText('O', axisX - 5, axisY + 5);

  // Axis labels
  ctx.font = '12px -apple-system,sans-serif';
  ctx.fillStyle = axisColor;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText('x', cw - 15, axisY - 8);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('y', axisX + 8, 12);
}

function getTickStep(sc){
  const rawStep = 40 / sc;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep / mag;
  if(norm < 1.5) return mag;
  if(norm < 3.5) return 2 * mag;
  if(norm < 7.5) return 5 * mag;
  return 10 * mag;
}

/* ── Animation ── */
function animate(ts){
  if(!playing) return;
  if(!lastTime) lastTime = ts;
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;
  progress += dt * (0.08 + speed * 0.06);
  if(progress >= 1){ progress = 1; playing = false; updateBtn(); }
  draw(progress);
  if(playing) rafId = requestAnimationFrame(animate);
}

function updateBtn(){ document.getElementById('btnPlay').textContent = playing ? '⏸ 暂停' : '▶ 播放'; }

function rebuild(){
  fibs = genFibs(count);
  progress = 0;
  playing = false;
  if(rafId) cancelAnimationFrame(rafId);
  lastTime = 0;
  draw(0);
  updateBtn();
}

function init(){
  canvas = document.getElementById('c');
  ctx = canvas.getContext('2d');

  document.getElementById('sldCount').addEventListener('input', e => {
    count = +e.target.value;
    document.getElementById('valCount').textContent = count;
    rebuild();
  });
  document.getElementById('sldSpeed').addEventListener('input', e => {
    speed = +e.target.value;
    document.getElementById('valSpeed').textContent = speed;
  });
  document.getElementById('btnPlay').addEventListener('click', () => {
    if(playing){ playing = false; }
    else { if(progress >= 1) progress = 0; playing = true; lastTime = 0; rafId = requestAnimationFrame(animate); }
    updateBtn();
  });
  document.getElementById('btnReset').addEventListener('click', rebuild);

  let rt;
  window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(() => draw(progress), 100); });

  rebuild();
  playing = true; lastTime = 0; updateBtn();
  rafId = requestAnimationFrame(animate);
}

document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
